    <style>
        :root { --primary: #50e3c2; --gold: #ffcc00; --dark-blue: #0a192f; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at top, #112240, #000000); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; }
        
        /* PWA Installer - Fixed Display */
        #pwa-installer { 
            display: flex; /* සැමවිටම පෙන්වීමට */
            width: 100%; 
            background: var(--primary); 
            color: #000; 
            padding: 12px; 
            position: fixed; 
            top: 0; 
            z-index: 1000; 
            font-weight: bold; 
            justify-content: space-around; 
            align-items: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
        }

        #btn-install { background: #000; color: #fff; border: none; padding: 8px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        .card { width: 88%; max-width: 360px; background: rgba(255, 255, 255, 0.05); padding: 40px 20px; border-radius: 35px; border: 1px solid rgba(80, 227, 194, 0.2); backdrop-filter: blur(15px); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-top: 60px; }
        .p-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--gold); padding: 4px; background: var(--dark-blue); margin-bottom: 15px; }
        
        .info-box { background: rgba(0,0,0,0.3); padding: 18px; border-radius: 20px; margin-bottom: 25px; border-left: 4px solid var(--primary); text-align: left; font-size: 0.9rem; line-height: 1.6; }

        .btn { width: 100%; padding: 16px; border-radius: 18px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1rem; margin-bottom: 12px; border: none; cursor: pointer; transition: 0.3s; box-sizing: border-box; }
        .btn-save { background: #fff; color: #0a192f; }
        
        /* New Buttons Layout */
        .action-grid { display: none; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .btn-action { flex-direction: column; padding: 12px 5px; font-size: 0.75rem; border-radius: 15px; margin-bottom: 0; }
        .btn-wa { background: #25D366; color: white; }
        .btn-call { background: #3498db; color: white; }
        .btn-sms { background: #f39c12; color: white; }
        
        .icon { width: 22px; height: 22px; fill: currentColor; }
    </style>
</head>
<body>

    <div id="pwa-installer">
        <span>📲 ADM Student App එක එක් කරන්න?</span>
        <button id="btn-install">එක් කරන්න</button>
    </div>

    <div class="card">

        <img id="cardLogo" src="https://raw.githubusercontent.com/janithdidula025-design/adm-vcard/main/logo.jpg" class="p-img">

        <div style="color: var(--gold); font-size: 0.95rem; margin-bottom: 20px;">Organizer / Manager</div>

            📍 මීගමුව පාර, නාරම්මල (ADM Institute)<br>
            🎓 Hall Class (ADM Campus)<br>
            📞 071 065 8051
        </div>

        <button id="mainSaveBtn" onclick="saveAndSwitch()" class="btn btn-save">
            👤 CONTACT එක SAVE කරන්න
        </button>

        <div id="actionGrid" class="action-grid">

    <script>
        let deferredPrompt;

        function saveAndSwitch() {
            const vcard = "BEGIN:VCARD\nVERSION:3.0\nFN:Janith Didula (ADM)\nTEL:0710658051\nEND:VCARD";
            const blob = new Blob([vcard], {type:'text/vcard'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Janith_ADM.vcf';
            a.click();

            document.getElementById('mainSaveBtn').style.display = 'none';
            document.getElementById('actionGrid').style.display = 'grid';
            localStorage.setItem('contact_saved', 'true');
        }

        window.onload = () => {
            if(localStorage.getItem('contact_saved') === 'true') {
                document.getElementById('mainSaveBtn').style.display = 'none';
                document.getElementById('actionGrid').style.display = 'grid';
            }

            // Installer visibility logic
            const installer = document.getElementById('pwa-installer');
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                installer.style.display = 'flex';
            });

            // බ්‍රවුසරය සහාය නොදක්වයි නම් හෝ දැනටමත් install කර ඇත්නම් බැනරය සැඟවීමට
            window.addEventListener('appinstalled', () => {
                installer.style.display = 'none';
            });
        };

        document.getElementById('btn-install').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                document.getElementById('pwa-installer').style.display = 'none';
            } else {
                alert("ඔබේ බ්‍රවුසරය හරහා මෙය කෙලින්ම Install කළ හැක (Add to Home Screen).");
            }
        });
    </script>
