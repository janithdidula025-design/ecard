<head>

<head>
  <link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoiQURNIEFkbWluIiwic2hvcnRfbmFtZSI6IkFETSBBZG1pbiIsInN0YXJ0X3VybCI6ImluZGV4Lmh0bWwiLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3ciOiIjMGExOTJmIiwidGhlbWVfY29sb3ciOiIjNjRmZmRhIiwib3JpZW50YXRpb24iOiJwb3J0cmFpdCIsImljb25zIjpbeyJzcmMiOiJodHRwczovL3Jhdy5naXRodWJ1c2VyY29udGVudC5jb20vamFuaXRoZGlkdWxhMDI1LWRlc2lnbi9lY2FyZC9tYWluL2xvZ28ucG5nIiwic2l6ZXMiOiI1MTJ4NTEyIiwidHlwZSI6ImltYWdlL3BuZyIsInB1cnBvc2UiOiJhbnkgbWFza2FibGUifV19">

    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/janithdidula025-design/ecard/main/logo.png">

    <style>
        body {
            background-color: #0a192f; /* Dark Blue Background */
            color: #64ffda;           /* Light Green/Aqua text */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* පේජ් එකේ මැදටම එන්න */
        }

        .container {
            text-align: center;
            padding: 20px;
            border: 1px solid #112240;
            border-radius: 15px;
            background: #112240; /* පොඩි Box එකක් වගේ පේන්න */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        img {
            width: 150px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 2px solid #64ffda; /* Logo එක වටේට පොඩි Border එකක් */
        }

        h1 {
            font-size: 24px;
            letter-spacing: 2px;
            margin: 0;
        }
    </style>

    <style>
        :root { --primary: #50e3c2; --gold: #ffcc00; --dark-blue: #0a192f; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; width: 100%; font-family: 'Segoe UI', sans-serif; }
        body { background: radial-gradient(circle at top, #112240, #000); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* PWA Installer - Buttons වැඩ කරන්න Z-index එක වැඩි කළා */
        #pwa-installer { display: none; position: fixed; top: 0; left: 0; width: 100%; background: var(--primary); color: #000; padding: 12px; z-index: 10000; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .pwa-btn { background: #000; color: #fff; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .top-bar { position: fixed; top: 65px; width: 100%; display: flex; justify-content: center; z-index: 5000; }
        .lang-switch { display: flex; gap: 8px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 15px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .lang-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--primary); color: white; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 0.75rem; transition: 0.3s; }
        .lang-btn.active { background: var(--primary); color: #000; font-weight: bold; }

        .card { width: 88%; max-width: 350px; background: rgba(255, 255, 255, 0.05); padding: 25px 20px; border-radius: 35px; border: 1px solid rgba(80, 227, 194, 0.2); backdrop-filter: blur(20px); text-align: center; margin-top: 40px; position: relative; z-index: 1; }
        .p-img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--gold); padding: 4px; object-fit: cover; }
        .info-box { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 20px; margin: 15px 0; border-left: 4px solid var(--primary); text-align: left; font-size: 0.8rem; line-height: 1.6; }
        
        .btn-save { width: 100%; padding: 15px; border-radius: 18px; font-weight: bold; font-size: 1rem; cursor: pointer; border: none; background: #fff; color: #0a192f; }
        
        .action-grid { display: none; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .dropdown { position: relative; width: 100%; }
        .btn-action { width: 100%; padding: 12px 5px; font-size: 0.8rem; border-radius: 15px; border: none; color: white; font-weight: bold; cursor: pointer; }
        
        .btn-wa { background: #128C7E; }
        .btn-call { background: #007bff; }
        .btn-sms { background: #f39c12; color: #000; }
        .btn-email { background: #e74c3c; }

        .dropdown-content { display: none; position: absolute; background: #fff; width: 100%; border-radius: 10px; z-index: 9000; bottom: 110%; left: 0; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .dropdown-content a { color: #333; padding: 10px; text-decoration: none; display: block; font-size: 13px; font-weight: bold; border-bottom: 1px solid #eee; text-align: center; }
        .show { display: block !important; }

        .status-toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); width: 280px; background: #fff; color: #333; padding: 12px; border-radius: 12px; border-left: 6px solid #2ecc71; transition: 0.5s; z-index: 9999; display: flex; align-items: center; }
        .status-toast.active { bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
        <img src="https://raw.githubusercontent.com/janithdidula025-design/ecard/main/logo 01.png" alt="Logo 01">
        <h1>ADM </h1>
    </div>
    <div id="pwa-installer">
        <span id="pwa-txt">📲 App එක Install කරන්න?</span>
        <div>
            <button id="btn-install" class="pwa-btn">Install</button>
            <button onclick="document.getElementById('pwa-installer').style.display='none'" style="background:none; border:none; color:#000; font-size:24px; cursor:pointer;">&times;</button>
        </div>
    </div>

    <div class="top-bar">
        <div class="lang-switch">
            <button id="btn-si" class="lang-btn active" onclick="setLanguage('si')">සිංහල</button>
            <button id="btn-en" class="lang-btn" onclick="setLanguage('en')">English</button>
        </div>
    </div>

    <div class="card">
        <div style="color: var(--primary); font-size: 0.6rem; letter-spacing: 2px; font-weight: 700;">ADM HIGHER EDUCATION</div>
        <img src="https://raw.githubusercontent.com/janithdidula025-design/ecard/main/logo.jpeg" class="p-img" alt="Profile">
        <h2 style="margin: 8px 0;">Janith Didula</h2>
        <div id="txt-role" style="color: var(--gold); font-size: 0.8rem; margin-bottom: 15px;">සංවිධායක / කළමනාකරු</div>
        
        <div class="info-box">
            <span id="lbl-addr">📍 මීගමුව පාර, නාරම්මල</span><br>
            <span id="lbl-phone">📞 071 065 8051</span><br>
            <span id="lbl-email">📧 janithdidula025@gmail.com</span>
        </div>

        <button id="mainSaveBtn" onclick="saveVCard()" class="btn-save">👤 CONTACT එක SAVE කරන්න</button>

        <div id="actionGrid" class="action-grid">
            <div class="dropdown">
                <button class="btn-action btn-wa" onclick="toggleMenu('waMenu')">WhatsApp</button>
                <div id="waMenu" class="dropdown-content">
                    <a href="https://wa.me/94710658051" target="_blank">071 065 8051</a>
                    <a href="https://wa.me/94763614792" target="_blank">076 361 4792</a>
                </div>
            </div>
            <div class="dropdown">
                <button class="btn-action btn-call" onclick="toggleMenu('callMenu')">Call</button>
                <div id="callMenu" class="dropdown-content">
                    <a href="tel:0710658051">071 065 8051</a>
                    <a href="tel:0763614792">076 361 4792</a>
                </div>
            </div>
            <div class="dropdown">
                <button class="btn-action btn-sms" onclick="toggleMenu('smsMenu')">SMS</button>
                <div id="smsMenu" class="dropdown-content">
                    <a href="sms:0710658051">071 065 8051</a>
                     <a href="sms:0763614792">076 361 4792</a>
                </div>
            </div>
            <div class="dropdown">
                <button class="btn-action btn-email" onclick="window.location.href='mailto:janithdidula025@gmail.com'">Email</button>
            </div>
        </div>
        <div style="margin-top: 15px; font-size: 0.5rem; opacity: 0.4;">ADM E-CARD SYSTEM v2.0</div>
    </div>

    <div id="statusToast" class="status-toast">
        <span style="font-size: 20px; margin-right: 10px;">✅</span>
        <div><b id="toast-title">විශේෂ දැනුම්දීමයි</b><p id="toast-msg" style="margin:0; font-size:11px;">ආයතනය අද විවෘතයි.</p></div>
    </div>

    <script>
        const translations = {
            si: { role: "සංවිධායක / කළමනාකරු", save: "👤 CONTACT එක SAVE කරන්න", toast: "ආයතනය අද විවෘතයි." },
            en: { role: "Organizer / Manager", save: "👤 SAVE CONTACT", toast: "The institute is open today." }
        };

        function setLanguage(lang) {
            document.getElementById('txt-role').innerText = translations[lang].role;
            document.getElementById('mainSaveBtn').innerText = translations[lang].save;
            document.getElementById('toast-msg').innerText = translations[lang].toast;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${lang}`).classList.add('active');
        }

        function toggleMenu(id) {
            const menu = document.getElementById(id);
            const isShown = menu.classList.contains('show');
            document.querySelectorAll('.dropdown-content').forEach(m => m.classList.remove('show'));
            if (!isShown) menu.classList.add('show');
        }

        // Dropdown එක පිටත click කළොත් වහන්න
        window.addEventListener('click', (e) => {
            if (!e.target.matches('.btn-action')) {
                document.querySelectorAll('.dropdown-content').forEach(m => m.classList.remove('show'));
            }
        });

        async function saveVCard() {
            const btn = document.getElementById('mainSaveBtn');
            btn.innerText = "⏳ Wait...";
            btn.disabled = true;

            const vcard = "BEGIN:VCARD\nVERSION:3.0\nFN:Janith Didula (ADM)\nORG:ADM Higher Education\nTEL;TYPE=CELL:0710658051\nTEL;TYPE=CELL:0763614792\nEMAIL:janithdidula025@gmail.com\nEND:VCARD";
            const vblob = new Blob([vcard], { type: 'text/vcard' });
            const vurl = URL.createObjectURL(vblob);
            const a = document.createElement('a');
            a.href = vurl; a.download = 'Janith_ADM.vcf'; a.click();

            localStorage.setItem('contact_saved', 'true');
            showGrid();
        }

        function showGrid() {
            document.getElementById('mainSaveBtn').style.display = 'none';
            document.getElementById('actionGrid').style.display = 'grid';
        }

        window.onload = () => {
            if (localStorage.getItem('contact_saved') === 'true') showGrid();
            setTimeout(() => {
                document.getElementById('statusToast').classList.add('active');
                setTimeout(() => document.getElementById('statusToast').classList.remove('active'), 6000);
            }, 2000);
        };

        // PWA Install Logic
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('pwa-installer').style.display = 'flex';
        });

        document.getElementById('btn-install').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                document.getElementById('pwa-installer').style.display = 'none';
            }
        });
    </script>
</body>
</html>
