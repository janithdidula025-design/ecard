<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADM Digital Card</title>
    <link rel="manifest" href="manifest-card.json">
    <meta name="theme-color" content="#0d237d">
    <style>
        :root { --primary: #50e3c2; --dark: #050811; }
        body { margin: 0; padding: 0; font-family: sans-serif; background: var(--dark); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; overflow: hidden; }
        
        /* Install Banner */
        #installBanner { display: none; width: 100%; background: var(--primary); color: #000; padding: 12px; position: fixed; top: 0; z-index: 1000; font-weight: bold; justify-content: space-between; align-items: center; box-sizing: border-box; }
        #installBtn { background: #000; color: #fff; border: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .container { width: 85%; max-width: 380px; background: rgba(255, 255, 255, 0.08); padding: 40px 20px; border-radius: 45px; border: 1px solid rgba(80, 227, 194, 0.3); backdrop-filter: blur(20px); text-align: center; }
        .p-img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary); margin-bottom: 20px; box-shadow: 0 4px 15px rgba(80, 227, 194, 0.4); }
        
        .btn { width: 100%; padding: 16px; border-radius: 18px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.1rem; margin-bottom: 12px; border: none; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }
        .btn-wa { background: #25D366; color: #fff; }
        .btn-save { background: var(--primary); color: var(--dark); }
        .wa-icon { width: 24px; height: 24px; fill: white; }
    </style>
</head>
<body>
    <div id="installBanner">
        <span>📲 ADM Card එක App එකක් විදිහට දාගන්න?</span>
        <button id="installBtn">INSTALL</button>
    </div>

    <div class="container">
        <img id="cardLogo" src="https://raw.githubusercontent.com/janithdidula025-design/adm-vcard/main/logo.jpg" class="p-img">
        <div style="color:var(--primary); font-weight:bold;">ADM Higher Education</div>
        <h2 style="margin:5px 0; font-size:1.8rem;">JANITH DIDULA</h2>
        <p style="opacity:0.7; margin-bottom:20px;">Organizer / Manager</p>
        
        <div style="background:rgba(0,0,0,0.3); padding:15px; border-radius:20px; margin-bottom:25px; border:1px solid rgba(255,255,255,0.1); font-size:0.95rem;">
            📍 මීගමුව පාර, නාරම්මල<br>📞 0710658051
        </div>

        <a href="https://wa.me/94710658051" class="btn btn-wa">
            <svg class="wa-icon" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.06 3.973L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/></svg>
            WHATSAPP සම්බන්ධ වන්න
        </a>
        <button onclick="saveContact()" class="btn btn-save">👤 CONTACT එක SAVE කරන්න</button>
    </div>

    <script>
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('installBanner').style.display = 'flex';
        });

        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                document.getElementById('installBanner').style.display = 'none';
            }
        });

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        function saveContact() {
            const v = `BEGIN:VCARD\nVERSION:3.0\nFN:Janith Didula (ADM)\nTEL:0710658051\nEND:VCARD`;
            const b = new Blob([v], {type:'text/vcard'});
            const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download='Janith_ADM.vcf'; a.click();
        }
    </script>
</body>
</html>
