    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { --primary: #50e3c2; --gold: #ffd700; --dark-blue: #0a192f; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at top, #112240, #0a192f); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; overflow-x: hidden; }
        
        /* Install Banner Styles */
        #pwa-installer { 
            display: none; 
            width: 100%; 
            background: var(--primary); 
            color: #000; 
            padding: 12px; 
            position: fixed; 
            top: 0; 
            z-index: 1000; 
            font-weight: bold; 
            justify-content: space-around; 
            align-items: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }
        #btn-install { background: #000; color: #fff; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Card Styles */
        .card { width: 88%; max-width: 360px; background: rgba(255, 255, 255, 0.05); padding: 35px 20px; border-radius: 35px; border: 1px solid rgba(80, 227, 194, 0.2); backdrop-filter: blur(15px); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; margin-top: 50px; }
        .p-img { width: 125px; height: 125px; border-radius: 50%; object-fit: cover; border: 3px solid var(--gold); padding: 4px; background: #0a192f; margin-bottom: 15px; }
        
        .info-box { background: rgba(0,0,0,0.25); padding: 18px; border-radius: 20px; margin-bottom: 25px; border-left: 4px solid var(--primary); text-align: left; font-size: 0.9rem; line-height: 1.6; }

        .btn { width: 100%; padding: 16px; border-radius: 18px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 1.1rem; margin-bottom: 12px; border: none; cursor: pointer; transition: 0.3s; box-sizing: border-box; }
        .btn-wa { background: #25D366; color: #fff; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); }
        .btn-save { background: #fff; color: #0a192f; }
        .btn:active { transform: scale(0.96); }
        .wa-icon { width: 26px; height: 26px; fill: white; }
    </style>
</head>
<body>

    <div id="pwa-installer">
        <span>📲 ADM Student App එක එක් කරන්න?</span>
        <button id="btn-install">එක් කරන්න</button>
    </div>

    <div class="card">
        <div style="color: var(--primary); font-size: 0.8rem; letter-spacing: 2px; font-weight: 700; margin-bottom: 5px;">ADM HIGHER EDUCATION</div>
        <img id="cardLogo" src="https://raw.githubusercontent.com/janithdidula025-design/adm-vcard/main/logo.jpg" class="p-img">
        <h2 style="margin: 5px 0;">JANITH DIDULA</h2>
        <div style="color: var(--gold); font-size: 0.95rem; margin-bottom: 20px;">Organizer / Manager</div>
        
        <div class="info-box">
            📍 මීගමුව පාර, නාරම්මල (ADM Institute)<br>
            🎓 Hall Class <br>
            📞 071 065 8051
        </div>

        <a href="https://wa.me/94710658051" class="btn btn-wa">
            <svg class="wa-icon" viewBox="0 0 448 512"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-5.5-2.8-23.2-8.5-44.2-27.1-16.4-14.6-27.4-32.7-30.6-38.1-3.2-5.5-.3-8.4 2.4-11.2 2.5-2.5 5.5-6.4 8.3-9.6 2.8-3.2 3.7-5.5 5.5-9.3 1.9-3.7 1-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 13.2 5.7 23.5 9.2 31.6 11.8 13.3 4.2 25.4 3.6 34.9 2.2 10.6-1.5 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/></svg>
            WHATSAPP සම්බන්ධ වන්න
        </a>
        <button onclick="saveContact()" class="btn btn-save">👤 CONTACT එක SAVE කරන්න</button>
    </div>

    <script>
        let deferredPrompt;

        window.onload = () => {
            // Admin එකෙන් වෙනස් කළ Logo එක පෙන්වීමට
            let savedLogo = localStorage.getItem('adm_logo_data');
            if (savedLogo) document.getElementById('cardLogo').src = savedLogo;
            
            // Service Worker Register කිරීම
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                .then(() => console.log("Service Worker Registered"));
            }
        };

        // PWA Install Logic
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Install Banner එක පෙන්වනවා
            document.getElementById('pwa-installer').style.display = 'flex';
        });

        document.getElementById('btn-install').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('pwa-installer').style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        // Contact Save Logic
        function saveContact() {
            const v = `BEGIN:VCARD\nVERSION:3.0\nFN:Janith Didula (ADM)\nTEL:0710658051\nEND:VCARD`;
            const b = new Blob([v], {type:'text/vcard'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b);
            a.download = 'Janith_ADM.vcf';
            a.click();
        }
    </script>
</body>
</html>
