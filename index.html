<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADM E-Card v2.0</title>
    <link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoiQURNIEFkbWluIiwic2hvcnRfbmFtZSI6IkFETSBBZG1pbiIsInN0YXJ0X3VybCI6ImluZGV4Lmh0bWwiLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3ciOiIjMGExOTJmIiwidGhlbWVfY29sb3ciOiIjNjRmZmRhIiwib3JpZW50YXRpb24iOiJwb3J0cmFpdCIsImljb25zIjpbeyJzcmMiOiJodHRwczovL3Jhdy5naXRodWJ1c2VyY29udGVudC5jb20vamFuaXRoZGlkdWxhMDI1LWRlc2lnbi9lY2FyZC9tYWluL2xvZ28ucG5nIiwic2l6ZXMiOiI1MTJ4NTEyIiwidHlwZSI6ImltYWdlL3BuZyIsInB1cnBvc2UiOiJhbnkgtWFza2FibGUifV19">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/janithdidula025-design/ecard/main/logo.png">
    <meta name="theme-color" content="#64ffda">

    <style>
        :root { --primary: #50e3c2; --gold: #ffcc00; --dark-blue: #0a192f; }
        body { 
            background: radial-gradient(circle at top, #112240, #000); 
            color: white; 
            font-family: 'Segoe UI', 'Latha', 'Tamil', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* PWA Installer Bar */
        #pwa-installer { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            background: var(--primary); 
            color: #000; 
            padding: 12px; 
            z-index: 10001; 
            justify-content: space-between; 
            align-items: center; 
            box-sizing: border-box; 
            font-weight: bold;
        }

        .top-bar { position: fixed; top: 60px; width: 100%; display: flex; justify-content: center; z-index: 5000; }
        .lang-switch { display: flex; gap: 5px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 15px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .lang-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--primary); color: white; padding: 6px 10px; border-radius: 10px; cursor: pointer; font-size: 0.7rem; transition: 0.3s; }
        .lang-btn.active { background: var(--primary); color: #000; font-weight: bold; }

        .card { width: 88%; max-width: 350px; background: rgba(255, 255, 255, 0.05); padding: 25px 20px; border-radius: 35px; border: 1px solid rgba(80, 227, 194, 0.2); backdrop-filter: blur(20px); text-align: center; position: relative; z-index: 1; }
        .p-img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--gold); padding: 4px; object-fit: cover; }
        .info-box { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 20px; margin: 15px 0; border-left: 4px solid var(--primary); text-align: left; font-size: 0.8rem; line-height: 1.6; }
        
        .btn-save { width: 100%; padding: 15px; border-radius: 18px; font-weight: bold; font-size: 0.9rem; cursor: pointer; border: none; background: #fff; color: #0a192f; transition: 0.3s; }
        .action-grid { display: none; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        
        .dropdown { position: relative; width: 100%; }
        .btn-action { width: 100%; padding: 12px 5px; font-size: 0.8rem; border-radius: 15px; border: none; color: white; font-weight: bold; cursor: pointer; }
        .btn-wa { background: #128C7E; }
        .btn-call { background: #007bff; }
        .btn-sms { background: #f39c12; color: #000; }
        .btn-email { background: #e74c3c; }

        .dropdown-content { display: none; position: absolute; background: #fff; width: 100%; border-radius: 10px; z-index: 9000; bottom: 110%; left: 0; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .dropdown-content a { color: #333; padding: 10px; text-decoration: none; display: block; font-size: 13px; font-weight: bold; border-bottom: 1px solid #eee; text-align: center; }
        .show { display: block !important; }

        .status-toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); width: 280px; background: #fff; color: #333; padding: 12px; border-radius: 12px; border-left: 6px solid #2ecc71; transition: 0.5s; z-index: 9999; display: flex; align-items: center; text-align: left; }
        .status-toast.active { bottom: 20px; }
    </style>
</head>
<body>

    <div id="pwa-installer">
        <span id="pwa-text">📲 App එක Install කරන්න?</span>
        <div>
            <button id="btn-install-main" style="background:#000; color:#fff; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold;">Install</button>
            <button onclick="document.getElementById('pwa-installer').style.display='none'" style="background:none; border:none; color:#000; font-size:24px; cursor:pointer; margin-left:10px;">&times;</button>
        </div>
    </div>

    <div class="top-bar">
        <div class="lang-switch">
            <button id="btn-si" class="lang-btn active" onclick="setLanguage('si')">සිංහල</button>
            <button id="btn-en" class="lang-btn" onclick="setLanguage('en')">English</button>
            <button id="btn-ta" class="lang-btn" onclick="setLanguage('ta')">தமிழ்</button>
        </div>
    </div>

    <div class="card">
        <div style="color: var(--primary); font-size: 0.6rem; letter-spacing: 2px; font-weight: 700;">ADM HIGHER EDUCATION</div>
        <img src="https://raw.githubusercontent.com/janithdidula025-design/ecard/main/logo.jpeg" class="p-img" alt="Profile">
        <h2 style="margin: 8px 0;">Janith Didula</h2>
        <div id="txt-role" style="color: var(--gold); font-size: 0.8rem; margin-bottom: 15px;">සංවිධායක / කළමනාකරු</div>
        
        <div class="info-box">
            <span id="lbl-addr">📍 මීගමුව පාර, නාරම්මල</span><br>
            <span id="lbl-phone">📞 071 065 8051</span><br>
            <span id="lbl-email">📧 janithdidula025@gmail.com</span>
        </div>

        <button id="mainSaveBtn" onclick="saveVCard()" class="btn-save">👤 CONTACT එක SAVE කරන්න</button>

        <div id="actionGrid" class="action-grid">
            <div class="dropdown">
                <button class="btn-action btn-wa" onclick="toggleMenu('waMenu')">WhatsApp</button>
                <div id="waMenu" class="dropdown-content">
                    <a href="https://wa.me/94710658051" target="_blank">071 065 8051</a>
                    <a href="https://wa.me/94763614792" target="_blank">076 361 4792</a>
                </div>
            </div>
            <div class="dropdown">
                <button class="btn-action btn-call" onclick="toggleMenu('callMenu')">Call</button>
                <div id="callMenu" class="dropdown-content">
                    <a href="tel:0710658051">071 065 8051</a>
                    <a href="tel:0763614792">076 361 4792</a>
                </div>
            </div>
            <div class="dropdown">
                <button class="btn-action btn-sms" onclick="toggleMenu('smsMenu')">SMS</button>
                <div id="smsMenu" class="dropdown-content">
                    <a href="sms:0710658051">071 065 8051</a>
                    <a href="sms:0763614792">076 361 4792</a>
                </div>
            </div>
            <div class="dropdown">
                <button class="btn-action btn-email" onclick="window.location.href='mailto:janithdidula025@gmail.com'">Email</button>
            </div>
        </div>
        <div style="margin-top: 15px; font-size: 0.5rem; opacity: 0.4;">CREATED BY JANITH DIDULA | v2.0</div>
    </div>

    <div id="statusToast" class="status-toast">
        <span style="font-size: 20px; margin-right: 10px;">✅</span>
        <div><b id="toast-title">විශේෂ දැනුම්දීමයි</b><p id="toast-msg" style="margin:0; font-size:11px;">ආයතනය අද විවෘතයි.</p></div>
    </div>

    <script>
        let deferredPrompt;

        const translations = {
            si: { 
                role: "සංවිධායක / කළමනාකරු", 
                save: "👤 CONTACT එක SAVE කරන්න", 
                toastTitle: "විශේෂ දැනුම්දීමයි",
                toastMsg: "ආයතනය අද විවෘතයි.",
                addr: "📍 මීගමුව පාර, නාරම්මල",
                pwa: "📲 App එක Install කරන්න?"
            },
            en: { 
                role: "Organizer / Manager", 
                save: "👤 SAVE CONTACT", 
                toastTitle: "Special Notice",
                toastMsg: "The institute is open today.",
                addr: "📍 Negombo Road, Narammala",
                pwa: "📲 Install the App?"
            },
            ta: { 
                role: "ஒருங்கிணைப்பாளர் / மேலாளர்", 
                save: "👤 தொடர்பைச் சேமிக்கவும்", 
                toastTitle: "முக்கிய அறிவிப்பு",
                toastMsg: "நிறுவனம் இன்று திறந்திருக்கும்.",
                addr: "📍 நீர்கொழும்பு வீதி, நாரம்மல",
                pwa: "📲 செயலியை நிறுவவா?"
            }
        };

        function setLanguage(lang) {
            document.getElementById('txt-role').innerText = translations[lang].role;
            document.getElementById('mainSaveBtn').innerText = translations[lang].save;
            document.getElementById('toast-title').innerText = translations[lang].toastTitle;
            document.getElementById('toast-msg').innerText = translations[lang].toastMsg;
            document.getElementById('lbl-addr').innerText = translations[lang].addr;
            document.getElementById('pwa-text').innerText = translations[lang].pwa;
            
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${lang}`).classList.add('active');
        }

        function toggleMenu(id) {
            const menu = document.getElementById(id);
            const isShown = menu.classList.contains('show');
            document.querySelectorAll('.dropdown-content').forEach(m => m.classList.remove('show'));
            if (!isShown) menu.classList.add('show');
        }

        window.addEventListener('click', (e) => {
            if (!e.target.matches('.btn-action')) {
                document.querySelectorAll('.dropdown-content').forEach(m => m.classList.remove('show'));
            }
        });

        async function saveVCard() {
            const btn = document.getElementById('mainSaveBtn');
            btn.innerText = "⏳ Wait...";
            btn.disabled = true;

            const vcard = "BEGIN:VCARD\nVERSION:3.0\nFN:Janith Didula (ADM)\nORG:ADM Higher Education\nTEL;TYPE=CELL:0710658051\nTEL;TYPE=CELL:0763614792\nEMAIL:janithdidula025@gmail.com\nEND:VCARD";
            const vblob = new Blob([vcard], { type: 'text/vcard' });
            const vurl = URL.createObjectURL(vblob);
            const a = document.createElement('a');
            a.href = vurl; a.download = 'Janith_ADM.vcf'; a.click();

            localStorage.setItem('contact_saved', 'true');
            setTimeout(showGrid, 1000);
        }

        function showGrid() {
            document.getElementById('mainSaveBtn').style.display = 'none';
            document.getElementById('actionGrid').style.display = 'grid';
        }

        window.onload = () => {
            if (localStorage.getItem('contact_saved') === 'true') showGrid();
            setTimeout(() => {
                document.getElementById('statusToast').classList.add('active');
                setTimeout(() => document.getElementById('statusToast').classList.remove('active'), 6000);
            }, 2000);
        };

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('pwa-installer').style.display = 'flex';
        });

        document.getElementById('btn-install-main').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                document.getElementById('pwa-installer').style.display = 'none';
            }
        });
        window.onload = () => {
    // Contact එක කලින්ම save කරලනම් Grid එක පෙන්වන්න
    if (localStorage.getItem('contact_saved') === 'true') showGrid();
    
    // Toast message එක පෙන්වන්න
    setTimeout(() => {
        document.getElementById('statusToast').classList.add('active');
        setTimeout(() => document.getElementById('statusToast').classList.remove('active'), 6000);
    }, 2000);

    // --- බලෙන් PWA Bar එක පෙන්වන කොටස (තත්පර 3කට පසු) ---
    setTimeout(() => {
        // දැනටමත් Install කරල නැත්නම් විතරක් පෙන්වන්න
        if (!window.matchMedia('(display-mode: standalone)').matches) {
            document.getElementById('pwa-installer').style.display = 'flex';
        }
    }, 3000);
};

// Install Button එක click කළ විට සිදුවිය යුතු වෙනස
document.getElementById('btn-install-main').addEventListener('click', async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
        document.getElementById('pwa-installer').style.display = 'none';
    } else {
        // බ්‍රවුසරය තවම Ready නැත්නම් හෝ iPhone එකක නම් මැනුවල් ක්‍රමය කියන්න
        const msg = {
            si: "ඔබේ බ්‍රවුසරයේ 'Add to Home Screen' හෝ 'Install' භාවිතා කරන්න.",
            en: "Please use 'Add to Home Screen' or 'Install' from your browser menu.",
            ta: "உங்கள் உலாவியில் 'Add to Home Screen' அல்லது 'Install' என்பதைப் பயன்படுத்தவும்."
        };
        // දැනට තෝරාගෙන තියෙන භාෂාව අනුව alert එකක් දෙන්න (setLanguage function එකේ currentLang එක save කරගන්න පුළුවන්)
        alert(msg.si); 
    }
});
    </script>
</body>
</html>
