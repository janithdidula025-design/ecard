<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADM E-Card</title>
    
    <link rel="manifest" href='data:application/json,{"name":"ADM E-Card","short_name":"ADM","start_url":"index.html","display":"standalone","background_color":"#0a192f","theme_color":"#50e3c2","icons":[{"src":"https://raw.githubusercontent.com/janithdidula025-design/ecard/main/logo.jpg","sizes":"512x512","type":"image/jpeg"}]}'>
    <meta name="theme-color" content="#0a192f">

    <style>
        :root { --primary: #50e3c2; --gold: #ffcc00; --dark-blue: #0a192f; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at top, #112240, #000); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; overflow-x: hidden; }
        
        .lang-switch { margin-bottom: 15px; display: flex; gap: 8px; z-index: 10; }
        .lang-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--primary); color: white; padding: 6px 15px; border-radius: 12px; cursor: pointer; font-size: 0.85rem; transition: 0.3s; }
        .lang-btn.active { background: var(--primary); color: #000; font-weight: bold; }

        /* Install Banner Fix */
        #pwa-installer { 
            display: none; width: 100%; background: var(--primary); color: #000; 
            padding: 15px; position: fixed; top: 0; z-index: 10000; 
            font-weight: bold; justify-content: space-between; align-items: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); box-sizing: border-box;
            animation: slideDown 0.5s ease-out;
        }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        #btn-install { background: #000; color: #fff; border: none; padding: 10px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        .card { width: 88%; max-width: 360px; background: rgba(255, 255, 255, 0.05); padding: 40px 20px; border-radius: 35px; border: 1px solid rgba(80, 227, 194, 0.2); backdrop-filter: blur(20px); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6); position: relative; }
        
        /* Logo Fix */
        .p-img-container { position: relative; width: 130px; height: 130px; margin: 0 auto 15px; }
        .p-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--gold); padding: 4px; background: var(--dark-blue); display: block; }
        
        .info-box { background: rgba(0,0,0,0.4); padding: 18px; border-radius: 20px; margin-bottom: 25px; border-left: 4px solid var(--primary); text-align: left; font-size: 0.85rem; line-height: 1.7; }
        
        .btn { width: 100%; padding: 16px; border-radius: 18px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1rem; margin-bottom: 12px; border: none; cursor: pointer; transition: 0.4s; }
        .btn-save { background: #fff; color: #0a192f; box-shadow: 0 5px 15px rgba(255,255,255,0.1); }
        .btn-save:hover { background: var(--primary); transform: translateY(-2px); }
        
        .action-grid { display: none; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .btn-action { flex-direction: column; padding: 12px 5px; font-size: 0.75rem; border-radius: 15px; text-decoration: none; display: flex; align-items: center; color: white; font-weight: bold; transition: 0.3s; }
        .btn-wa { background: #25D366; }
        .btn-call { background: #3498db; }
        .btn-sms { background: #f39c12; }

        .footer-credit { margin-top: 25px; font-size: 0.7rem; color: rgba(255,255,255,0.4); letter-spacing: 1.5px; text-transform: uppercase; }
        .footer-credit b { color: var(--primary); }
    </style>
</head>
<body>

    <div id="pwa-installer">
        <span id="txt-pwa">📲 ADM Card එක App එකක් ලෙස එක් කරන්න?</span>
        <button id="btn-install">එක් කරන්න</button>
    </div>

    <div class="lang-switch">
        <button class="lang-btn active" onclick="setLanguage('si')">සිංහල</button>
        <button class="lang-btn" onclick="setLanguage('en')">English</button>
        <button class="lang-btn" onclick="setLanguage('ta')">தமிழ்</button>
    </div>

    <div class="card">
        <div style="color: var(--primary); font-size: 0.75rem; letter-spacing: 2px; font-weight: 700; margin-bottom: 8px;">ADM HIGHER EDUCATION</div>
        
        <div class="p-img-container">
            <img id="profile-pic" 
                 src="https://raw.githubusercontent.com/janithdidula025-design/ecard/main/logo.jpg" 
                 class="p-img" 
                 crossorigin="anonymous"
                 onerror="this.src='https://via.placeholder.com/150?text=ADM'">
        </div>
             
        <h2 style="margin: 5px 0; color: white;">Janith Didula</h2>
        <div id="txt-role" style="color: var(--gold); font-size: 0.95rem; margin-bottom: 20px;">සංවිධායක / කළමනාකරු</div>
        
        <div class="info-box" id="info-box">
            📍 මීගමුව පාර, නාරම්මල (ADM ආයතනය)<br>
            🎓 ශාලා පන්ති (ADM Campus)<br>
            📞 071 065 8051<br>
            📧 janithdidula@gmail.com
        </div>

        <button id="mainSaveBtn" onclick="saveVCard()" class="btn btn-save">
            👤 CONTACT එක SAVE කරන්න
        </button>

        <div id="actionGrid" class="action-grid">
            <a href="https://wa.me/94710658051" class="btn btn-action btn-wa">WhatsApp</a>
            <a href="tel:0710658051" class="btn btn-action btn-call">Call</a>
            <a href="sms:0710658051" class="btn btn-action btn-sms">SMS</a>
        </div>

        <div class="footer-credit" id="footer-credit">
            Created by <b>Janith Didula</b>
        </div>
       <div class="p-img-container">
           
    <img id="profile-pic" 
         src="https://raw.githubusercontent.com/janithdidula025-design/ecard/main/logo.jpeg" 
         class="p-img" 
         crossorigin="anonymous"
         onerror="this.src='https://via.placeholder.com/150?text=ADM'">
</div> 
    </div>


    <script>
        const translations = {
            si: {
                role: "සංවිධායක / කළමනාකරු",
                info: "📍 මීගමුව පාර, නාරම්මල (ADM ආයතනය)<br>🎓 ශාලා පන්ති (ADM Campus)<br>📞 071 065 8051<br>📧 janithdidula@gmail.com",
                save: "👤 CONTACT එක SAVE කරන්න",
                pwa: "📲 ADM Card එක App එකක් ලෙස එක් කරන්න?",
                install: "එක් කරන්න",
                credit: "නිර්මාණය කළේ <b>Janith Didula</b>"
            },
            en: {
                role: "Organizer / Manager",
                info: "📍 Negombo Road, Narammala (ADM Institute)<br>🎓 Hall Classes (ADM Campus)<br>📞 071 065 8051<br>📧 janithdidula@gmail.com",
                save: "👤 SAVE CONTACT",
                pwa: "📲 Add ADM Card as an App?",
                install: "Install",
                credit: "Created by <b>Janith Didula</b>"
            },
            ta: {
                role: "ஏற்பாட்டாளர் / முகாமையாளர்",
                info: "📍 நீர்கொழும்பு வீதி, நாரம்மல (ADM நிறுவனம்)<br>🎓 மண்டப வகுப்புகள் (ADM Campus)<br>📞 071 065 8051<br>📧 janithdidula@gmail.com",
                save: "👤 தொடர்பைச் சேமிக்கவும்",
                pwa: "📲 ADM கார்டை செயலியில் சேர்க்கவா?",
                install: "சேர்க்கவும்",
                credit: "உருவாக்கியவர் <b>Janith Didula</b>"
            }
        };

        function setLanguage(lang) {
            document.getElementById('txt-role').innerText = translations[lang].role;
            document.getElementById('info-box').innerHTML = translations[lang].info;
            document.getElementById('mainSaveBtn').innerText = translations[lang].save;
            document.getElementById('txt-pwa').innerText = translations[lang].pwa;
            document.getElementById('btn-install').innerText = translations[lang].install;
            document.getElementById('footer-credit').innerHTML = translations[lang].credit;

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase().includes(lang === 'si' ? 'සිංහල' : lang === 'ta' ? 'தமிழ்' : 'english')) {
                    btn.classList.add('active');
                }
            });
        }

        let deferredPrompt;
        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('contact_saved') === 'true') showActions();
            
            // Registering Service Worker
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log("SW Registered");
                }).catch(err => console.log("SW Error"));
            }
        });

        // CONTACT SAVE LOGIC
        async function saveVCard() {
            const currentImg = document.getElementById('profile-pic').src;
            let base64Img = "";
            try {
                // Fetch image and convert to base64
                const response = await fetch(currentImg);
                const blob = await response.blob();
                const reader = new FileReader();
                base64Img = await new Promise((resolve) => {
                    reader.onloadend = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(blob);
                });
            } catch (e) { console.log("Logo could not be saved to contact"); }

            const vcard = "BEGIN:VCARD\nVERSION:3.0\nFN:Janith Didula (ADM)\nORG:ADM Higher Education\nTEL;TYPE=CELL:0710658051\nEMAIL:janithdidula@gmail.com\nADR:;;Meegamuwa Road;Narammala;;;Sri Lanka\n" + (base64Img ? "PHOTO;ENCODING=b;TYPE=JPEG:" + base64Img + "\n" : "") + "END:VCARD";
            const blob = new Blob([vcard], {type:'text/vcard'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Janith_ADM.vcf';
            a.click();
            showActions();
            localStorage.setItem('contact_saved', 'true');
        }

        function showActions() {
            document.getElementById('mainSaveBtn').style.display = 'none';
            document.getElementById('actionGrid').style.display = 'grid';
        }

        // PWA INSTALL LOGIC
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            console.log("Install prompt ready");
            // Show banner after 3 seconds
            setTimeout(() => {
                if (!window.matchMedia('(display-mode: standalone)').matches) {
                    document.getElementById('pwa-installer').style.display = 'flex';
                }
            }, 3000);
        });

        document.getElementById('btn-install').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('pwa-installer').style.display = 'none';
                }
                deferredPrompt = null;
            }
        });
    </script>
</body>
</html>
