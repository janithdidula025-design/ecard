<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADM E-Card </title>
    
<link rel="manifest" href='data:application/json,{"name":"ADM E-Card","short_name":"ADM E-CARD","start_url":"index.html","display":"standalone","background_color":"#0a192f","theme_color":"#64ffda","icons":[{"src":"https://raw.githubusercontent.com/janithdidula025-design/ecard/main/logo.jpg","sizes":"512x512","type":"image/jpg"}]}'>

    <style>
        :root { --primary: #50e3c2; --gold: #ffcc00; --dark-blue: #0a192f; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at top, #112240, #000); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; overflow-x: hidden; }
        
        #pwa-installer { 
            display: none; width: 100%; background: var(--primary); color: #000; 
            padding: 15px; position: fixed; top: 0; z-index: 9999; 
            font-weight: bold; justify-content: space-between; align-items: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); box-sizing: border-box;
        }
        #btn-install { background: #000; color: #fff; border: none; padding: 10px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        .card { width: 88%; max-width: 360px; background: rgba(255, 255, 255, 0.05); padding: 40px 20px; border-radius: 35px; border: 1px solid rgba(80, 227, 194, 0.2); backdrop-filter: blur(15px); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .p-img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 3px solid var(--gold); padding: 4px; background: var(--dark-blue); margin-bottom: 15px; }
        
        .info-box { background: rgba(0,0,0,0.3); padding: 18px; border-radius: 20px; margin-bottom: 25px; border-left: 4px solid var(--primary); text-align: left; font-size: 0.85rem; line-height: 1.6; }
        
        .btn { width: 100%; padding: 16px; border-radius: 18px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1rem; margin-bottom: 12px; border: none; cursor: pointer; transition: 0.3s; }
        .btn-save { background: #fff; color: #0a192f; }
        
        .action-grid { display: none; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .btn-action { flex-direction: column; padding: 12px 5px; font-size: 0.75rem; border-radius: 15px; text-decoration: none; display: flex; align-items: center; color: white; font-weight: bold; }
        .btn-wa { background: #25D366; }
        .btn-call { background: #3498db; }
        .btn-sms { background: #f39c12; }
    </style>
</head>
<body>

    <div id="pwa-installer">
        <span>📲 ADM Card එක App එකක් ලෙස එක් කරන්න?</span>
        <button id="btn-install">Install</button>
    </div>

    <div class="card">
        <div style="color: var(--primary); font-size: 0.75rem; letter-spacing: 2px; font-weight: 700; margin-bottom: 8px;">ADM HIGHER EDUCATION</div>
        
        <img id="profile-pic" 
             src="https://raw.githubusercontent.com/janithdidula025-design/ecard/main/logo.jpeg" 
             class="p-img" 
             onerror="this.src='https://via.placeholder.com/150?text=ADM'">
             
        <h2 style="margin: 5px 0; color: white;">G.A.Janith Didula Gamlath </h2>
        <div style="color: var(--gold); font-size: 0.95rem; margin-bottom: 20px;">Organizer / Manager</div>
        
        <div class="info-box">
            📍 මීගමුව පාර, නාරම්මල (ADM Institute)<br>
            🎓 Hall Class (ADM Campus)<br>
            📞 071 065 8051<br>
            📧 janithdidula@gmail.com
        </div>

        <button id="mainSaveBtn" onclick="saveVCard()" class="btn btn-save">
            👤 CONTACT එක SAVE කරන්න
        </button>

        <div id="actionGrid" class="action-grid">
            <a href="https://wa.me/94710658051" class="btn btn-action btn-wa">WhatsApp</a>
            <a href="tel:0710658051" class="btn btn-action btn-call">Call</a>
            <a href="sms:0710658051" class="btn btn-action btn-sms">SMS</a>
        </div>
    </div>

    <script>
        let deferredPrompt;

        // පේජ් එක ලෝඩ් වන විට පරීක්ෂා කිරීම
        window.addEventListener('DOMContentLoaded', () => {
            if(localStorage.getItem('contact_saved') === 'true') {
                showActions();
            }

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').catch(e => console.log("SW Error"));
            }
        });

        // vCard Save Logic
        async function saveVCard() {
            const currentImg = document.getElementById('profile-pic').src;
            let base64Img = "";
            
            try {
                // පින්තූරය vCard එකට ඇතුළත් කිරීම සඳහා Fetch කිරීම
                const response = await fetch(currentImg);
                const blob = await response.blob();
                const reader = new FileReader();
                base64Img = await new Promise((resolve) => {
                    reader.onloadend = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(blob);
                });
            } catch (e) { console.log("Photo encoding skipped due to CORS or Error"); }

            const vcard = 
                "BEGIN:VCARD\nVERSION:3.0\nFN:Janith Didula (ADM)\nORG:ADM Higher Education\nTEL;TYPE=CELL:0710658051\n" +
                "EMAIL:janithdidula@gmail.com\n" +
                "ADR:;;Meegamuwa Road;Narammala;;;Sri Lanka\n" +
                (base64Img ? "PHOTO;ENCODING=b;TYPE=JPEG:" + base64Img + "\n" : "") +
                "END:VCARD";

            const blob = new Blob([vcard], {type:'text/vcard'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Janith_ADM.vcf';
            a.click();

            showActions();
            localStorage.setItem('contact_saved', 'true');
        }

        function showActions() {
            document.getElementById('mainSaveBtn').style.display = 'none';
            document.getElementById('actionGrid').style.display = 'grid';
        }

        // PWA Install Prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('pwa-installer').style.display = 'flex';
        });

        document.getElementById('btn-install').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                document.getElementById('pwa-installer').style.display = 'none';
            }
        });
    </script>
</body>
</html>
