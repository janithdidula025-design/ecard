<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADM Admin Dashboard</title>
    <link rel="manifest" href="manifest-admin.json">
    <style>
        :root { --primary: #50e3c2; --bg: #050811; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; }
        #pwa-admin-inst { display: none; width: 100%; background: #fff; color: #000; padding: 12px; position: fixed; top: 0; z-index: 1000; font-weight: bold; justify-content: space-around; align-items: center; }
        .card { width: 90%; max-width: 400px; background: #112240; padding: 30px 20px; border-radius: 35px; border: 1px solid var(--primary); text-align: center; }
        .admin-logo { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--primary); cursor: pointer; margin-bottom: 15px; }
        input[type="tel"] { width: 100%; padding: 18px; margin-bottom: 20px; border-radius: 15px; border: 2px solid #233554; background: #0a192f; color: var(--primary); font-size: 1.8rem; text-align: center; font-weight: bold; box-sizing: border-box; outline: none; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-wa { background: #25D366; color: white; }
        .btn-call { background: #fff; color: #000; }
        .btn-sms { background: #007aff; color: white; }
    </style>
</head>
<body>
    <div id="pwa-admin-inst">
        <span>📲 ADM Admin App එක එක් කරන්න?</span>
        <button onclick="installAdmin()" style="background:#000;color:#fff;padding:8px;border-radius:8px;border:none;">INSTALL</button>
    </div>
    <div class="card">
        <img id="prev" src="https://raw.githubusercontent.com/janithdidula025-design/adm-vcard/main/logo.jpg" class="admin-logo" onclick="document.getElementById('fileInp').click()">
        <input type="file" id="fileInp" accept="image/*" style="display: none;" onchange="updateLogo(this)">
        <div style="color:var(--primary); font-weight:bold; margin-bottom:15px;">ADMIN MANAGEMENT</div>
        <input type="tel" id="num" placeholder="07XXXXXXXX" maxlength="10">
        <div class="btn-group">
            <button class="btn btn-wa" onclick="sendAction('wa')">📲 SEND CARD (WA)</button>
            <button class="btn btn-call" onclick="sendAction('call')">📞 CALL STUDENT</button>
            <button class="btn btn-sms" onclick="sendAction('sms')">💬 SEND SMS</button>
        </div>
    </div>
    <script>
        let adminPrompt;
        window.onload = () => {
            let saved = localStorage.getItem('adm_logo_data');
            if(saved) document.getElementById('prev').src = saved;
            if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
        };
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); adminPrompt = e;
            document.getElementById('pwa-admin-inst').style.display = 'flex';
        });
        function installAdmin() { if(adminPrompt) adminPrompt.prompt(); }
        function updateLogo(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    localStorage.setItem('adm_logo_data', e.target.result);
                    document.getElementById('prev').src = e.target.result;
                    alert("ලෝගෝ එක වෙනස් වුණා! Index එක Refresh කරලා බලන්න.");
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        function sendAction(type) {
            let n = document.getElementById('num').value;
            if(n.length < 10) return alert("අංකය පරීක්ෂා කරන්න!");
            let link = window.location.href.replace('admin.html', 'index.html');
            let msg = encodeURIComponent(`ආයුබෝවන්! ADM පන්ති විස්තර මෙතැනින්: ${link}`);
            if(type==='wa') window.open(`https://wa.me/94${n.substring(1)}?text=${msg}`);
            else if(type==='call') window.open(`tel:${n}`);
            else if(type==='sms') window.open(`sms:${n}?body=${msg}`);
        }
    </script>
</body>
</html>
