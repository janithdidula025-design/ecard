<head>

    <style>
        :root { --accent: #64ffda; --bg-dark: #0a192f; --card-bg: #112240; --text-main: #ccd6f6; }
        
        /* මුළු පිටුවම Scroll වීම වැළැක්වීම */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: var(--bg-dark); 
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start;
            padding: 10px; 
            box-sizing: border-box;
        }
        
        /* Install Prompt */
        #install-prompt { display: none; position: fixed; top: 0; background: var(--accent); color: #020c1b; padding: 12px; width: 100%; z-index: 10000; justify-content: space-around; align-items: center; font-weight: bold; border-bottom: 2px solid #020c1b; font-size: 0.8rem; }
        #install-prompt button { background: #020c1b; color: var(--accent); border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Language Bar */
        .lang-bar { display: flex; gap: 8px; margin: 10px 0; z-index: 10; }
        .lang-btn { background: rgba(100, 255, 218, 0.05); border: 1px solid var(--accent); color: var(--accent); padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.75rem; transition: 0.3s; }
        .lang-btn.active { background: var(--accent); color: #020c1b; font-weight: bold; }

        /* Profile Section */
        .profile-section { width: 80px; height: 80px; margin-bottom: 5px; flex-shrink: 0; }
        .profile-section img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; background: var(--card-bg); box-shadow: 0 0 20px rgba(100, 255, 218, 0.2); }

        h2 { margin: 5px 0 0 0; letter-spacing: 2px; text-transform: uppercase; font-size: 1.2rem; color: #fff; flex-shrink: 0; }
        .subtitle { color: var(--accent); margin-bottom: 10px; font-size: 0.65rem; letter-spacing: 3px; font-weight: bold; opacity: 0.9; flex-shrink: 0; }

        /* Scrollable Container - මැද කොටස පමණක් scroll වීමට */
        .scroll-container {
            width: 100%;
            max-width: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 20px;
            /* Scrollbar එක සැඟවීමට */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        .main-card { 
            width: 100%; 
            background: rgba(17, 34, 64, 0.8);
            backdrop-filter: blur(10px);
            padding: 25px 20px; 
            border-radius: 25px; 
            border: 1px solid rgba(100, 255, 218, 0.15); 
            text-align: center; 
            box-sizing: border-box; 
        }
        
        input, textarea { 
            width: 100%; 
            background: #020c1b; 
            border: 2px solid #233554; 
            border-radius: 15px; 
            color: var(--accent); 
            text-align: center; 
            outline: none; 
            transition: 0.3s;
            box-sizing: border-box;
        }

        input[type="tel"] { padding: 15px; font-size: 1.8rem; font-weight: bold; margin-bottom: 20px; letter-spacing: 2px; }
        input[type="text"] { padding: 12px; font-size: 1rem; margin-bottom: 10px; }
        textarea { padding: 12px; font-size: 0.9rem; height: 80px; text-align: left; margin-bottom: 10px; }

        input:focus, textarea:focus { border-color: var(--accent); }

        .btn { 
            width: 100%; 
            padding: 16px; 
            border-radius: 15px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            color: white;
            margin-bottom: 10px;
        }
        .btn-wa { background: linear-gradient(135deg, #25D366, #128C7E); }
        .btn-sms { background: linear-gradient(135deg, #1d9bf0, #0077b5); }
        .btn-push { background: linear-gradient(135deg, #ff4b2b, #ff416c); }
        .btn:active { transform: scale(0.98); }
        
        .footer-credit { 
            margin-top: auto; 
            padding: 15px; 
            font-size: 0.75rem; 
            color: var(--text-main);
            opacity: 0.6; 
            text-align: center;
        }
        .footer-credit b { color: var(--accent); }

    </style>
</head>
<body>

    <div id="install-prompt">
        <span id="txt-install">📲 ADM Admin App එක එක් කරන්න?</span>
        <button id="btn-install">INSTALL</button>
    </div>

    <div class="lang-bar">
        <button class="lang-btn active" onclick="changeLang('si')">සිංහල</button>
        <button class="lang-btn" onclick="changeLang('ta')">தமிழ்</button>
        <button class="lang-btn" onclick="changeLang('en')">English</button>
    </div>

    <div class="profile-section">
        <img src="https://raw.githubusercontent.com/janithdidula025-design/ecard/main/logo.png" alt="ADM Logo">
    </div>
    
    <h2 id="txt-title">ADM CENTRAL</h2>
    <p id="txt-subtitle" class="subtitle">MANAGEMENT & DISPATCH</p>

    <div class="scroll-container">
        <div class="main-card">
            <input type="tel" id="phone" placeholder="07XXXXXXXX" maxlength="10">
            <button class="btn btn-wa" id="btn-wa" onclick="execute('wa')">WhatsApp Link Send</button>
            <button class="btn btn-sms" id="btn-sms" onclick="execute('sms')">Direct SMS Send</button>
        </div>
        
        <div class="main-card">
            <h3 style="color: var(--accent); margin: 0 0 15px 0; font-size: 1rem;">PUSH NOTIFICATION SEND</h3>
            <input type="text" id="notif-title" placeholder="පණිවිඩයේ මාතෘකාව (Title)">
            <textarea id="notif-body" placeholder="පණිවිඩය මෙතන ලියන්න..."></textarea>
            <button class="btn btn-push" onclick="sendNotification()">SEND TO ALL STUDENTS</button>
        </div>
    </div>

    <div class="footer-credit">
        Created by <b>Janith Didula</b>
    </div>

    <script>
        const translations = {
            si: { title: "ADM CENTRAL", subtitle: "MANAGEMENT & DISPATCH", phonePh: "07XXXXXXXX", btnWa: "WhatsApp Link Send", btnSms: "Direct SMS Send", install: "📲 ADM Admin App එක එක් කරන්න?", alertNum: "කරුණාකර නිවැරදි අංකයක් ඇතුළත් කරන්න!" },
            ta: { title: "ADM CENTRAL", subtitle: "மேலாண்மை மற்றும் அனுப்புதல்", phonePh: "07XXXXXXXX", btnWa: "வாட்ஸ்අප් மூலம் அனுப்ப", btnSms: "நேරடி SMS அனுப்ப", install: "📲 ADM பயன்பාட்டைச் சேர்க்கவா?", alertNum: "සම්පූර්ණ අංකය ඇතුළත් කරන්න!" },
            en: { title: "ADM CENTRAL", subtitle: "MANAGEMENT & DISPATCH", phonePh: "07XXXXXXXX", btnWa: "Send via WhatsApp", btnSms: "Send Direct SMS", install: "📲 Add ADM Admin App?", alertNum: "Please enter a valid number!" }
        };

        let currentLang = 'si';

        function changeLang(lang) {
            currentLang = lang;
            const t = translations[lang];
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('txt-subtitle').innerText = t.subtitle;
            document.getElementById('phone').placeholder = t.phonePh;
            document.getElementById('btn-wa').innerText = t.btnWa;
            document.getElementById('btn-sms').innerText = t.btnSms;
            document.getElementById('txt-install').innerText = t.install;
            
            document.querySelectorAll('.lang-btn').forEach(b => {
                b.classList.remove('active');
                if(b.innerText.toLowerCase() === (lang === 'si' ? 'සිංහල' : lang === 'ta' ? 'தமிழ்' : 'english').toLowerCase()) {
                    b.classList.add('active');
                }
            });
        }

        function execute(type) {
            const num = document.getElementById('phone').value;
            if (num.length < 10) return alert(translations[currentLang].alertNum);

            const link = "https://janithdidula025-design.github.io/ecard/index.html";
            const msgBody = `ඔබේ ADM Digital Student Card එක මෙතැනින් ලබාගන්න: ${link}`;

            if (type === 'wa') {
                window.location.href = `whatsapp://send?phone=94${num.substring(1)}&text=${encodeURIComponent(msgBody)}`;
            } else {
                const sep = (navigator.userAgent.match(/iPhone|iPad|iPod/i)) ? '&' : '?';
                window.location.href = `sms:${num}${sep}body=${encodeURIComponent(msgBody)}`;
            }
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-prompt').style.display = 'flex';
        });

        document.getElementById('btn-install').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                document.getElementById('install-prompt').style.display = 'none';
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,self.addEventListener("fetch", (e) => {});');
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZRZecMIMxOO9SmnaJctRf1x-DxFId340",
            authDomain: "ecard-c8f61.firebaseapp.com",
            projectId: "ecard-c8f61",
            storageBucket: "ecard-c8f61.firebasestorage.app",
            messagingSenderId: "204555084801",
            appId: "1:204555084801:web:906ad95ddf279c4a6e0c00"
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);

        async function requestPermission() {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    const token = await getToken(messaging, { 
                        vapidKey: 'BAnTLc-JQDvEggqLq5KmhKIBdfGS--0bMX4O8FpM5jkxevrTtSLGhY_EQVg5QPkGEr1htEFOQqj670lRf_szhA8' 
                    });
                    if (token) { console.log("Device Token:", token); }
                }
            } catch (err) { console.log("Error:", err); }
        }

        window.onload = requestPermission;
        onMessage(messaging, (payload) => {
            alert(payload.notification.title + ": " + payload.notification.body);
        });
    </script>
</body>
