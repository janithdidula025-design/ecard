<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADM Admin Panel</title>
    
    <link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoiQURNIEFkbWluIiwic2hvcnRfbmFtZSI6IkFETSBBZG1pbiIsInN0YXJ0X3VybCI6ImFkbWluLmh0bWwiLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3ciOiIjMGExOTJmIiwidGhlbWVfY29sb3ciOiIjNjRmZmRhIiwib3JpZW50YXRpb24iOiJwb3J0cmFpdCIsImljb25zIjpbeyJzcmMiOiJodHRwczovL3Jhdy5naXRodWJ1c2VyY29udGVudC5jb20vamFuaXRoZGlkdWxhMDI1LWRlc2lnbi9lY2FyZC9tYWluL2xvZ28ucG5nIiwic2l6ZXMiOiI1MTJ4NTEyIiwidHlwZSI6ImltYWdlL3BuZyIsInB1cnBvc2UiOiJhbnkgbWFza2FibGUifV19">

    <style>
        :root { --accent: #64ffda; --bg-dark: #0a192f; --card-bg: #112240; --text-main: #ccd6f6; }
        body { margin: 0; background-color: var(--bg-dark); color: var(--text-main); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px 15px; box-sizing: border-box; }
        
        /* Install Prompt */
        #install-prompt { display: none; position: fixed; top: 0; background: var(--accent); color: #020c1b; padding: 12px; width: 100%; z-index: 10000; justify-content: space-around; align-items: center; font-weight: bold; font-size: 0.9rem; }
        #install-prompt button { background: #020c1b; color: var(--accent); border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Language Bar */
        .lang-bar { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .lang-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--accent); color: var(--accent); padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 0.75rem; transition: 0.3s; }
        .lang-btn.active { background: var(--accent); color: #020c1b; font-weight: bold; box-shadow: 0 0 10px rgba(100, 255, 218, 0.4); }

        .profile-section { width: 100px; height: 100px; margin-bottom: 15px; }
        .profile-section img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; background: var(--card-bg); box-shadow: 0 0 25px rgba(100, 255, 218, 0.15); }

        .main-card { width: 100%; max-width: 360px; background: var(--card-bg); padding: 30px 20px; border-radius: 25px; border: 1px solid rgba(100, 255, 218, 0.1); text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.4); box-sizing: border-box; }
        
        h2 { margin: 5px 0; letter-spacing: 2px; text-transform: uppercase; font-size: 1.4rem; color: white; }
        .subtitle { color: var(--accent); margin: -5px 0 20px 0; font-size: 0.75rem; letter-spacing: 3px; font-weight: bold; }

        input { width: 100%; background: #020c1b; border: 2px solid #233554; border-radius: 15px; padding: 15px; color: var(--accent); font-size: 1.5rem; text-align: center; margin-bottom: 20px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(100, 255, 218, 0.1); }
        
        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 12px; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-wa { background: #25D366; color: white; }
        .btn-sms { background: #1d9bf0; color: white; }
        .btn:active { transform: scale(0.96); opacity: 0.9; }
        
        .footer-credit { margin-top: auto; padding: 20px; font-size: 0.75rem; opacity: 0.4; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="install-prompt">
        <span id="txt-install">📲 ADM Admin App එක එක් කරන්න?</span>
        <button id="btn-install">INSTALL</button>
    </div>

    <div class="lang-bar">
        <button class="lang-btn active" onclick="changeLang('si')">සිංහල</button>
        <button class="lang-btn" onclick="changeLang('ta')">தமிழ்</button>
        <button class="lang-btn" onclick="changeLang('en')">English</button>
    </div>

    <div class="profile-section">
        <img src="https://raw.githubusercontent.com/janithdidula025-design/ecard/main/logo.png" alt="ADM Logo">
    </div>
    
    <h2 id="txt-title">ADM CENTRAL</h2>
    <p id="txt-subtitle" class="subtitle">MANAGEMENT & DISPATCH</p>

    <div class="main-card">
        <input type="tel" id="phone" placeholder="07XXXXXXXX" maxlength="10">
        <button class="btn btn-wa" id="btn-wa" onclick="execute('wa')">WhatsApp Link Send</button>
        <button class="btn btn-sms" id="btn-sms" onclick="execute('sms')">Direct SMS Send</button>
    </div>

    <div class="footer-credit">Developed by <b>Janith Didula</b></div>

    <script>
        const translations = {
            si: { 
                title: "ADM CENTRAL", subtitle: "MANAGEMENT & DISPATCH", phonePh: "07XXXXXXXX", 
                btnWa: "WhatsApp Link Send", btnSms: "Direct SMS Send", 
                install: "📲 ADM Admin App එක එක් කරන්න?", alertNum: "කරුණාකර නිවැරදි අංකයක් ඇතුළත් කරන්න!" 
            },
            ta: { 
                title: "ADM CENTRAL", subtitle: "மேலாண்மை மற்றும் அனுப்புதல்", phonePh: "07XXXXXXXX", 
                btnWa: "வாட்ஸ்அப் மூலம் அனுப்ப", btnSms: "நேரடி SMS அனுப்ப", 
                install: "📲 ADM பயன்பாட்டைச் சேர்க்கவா?", alertNum: "சரியான எண்ணை உள்ளிடவும்!" 
            },
            en: { 
                title: "ADM CENTRAL", subtitle: "MANAGEMENT & DISPATCH", phonePh: "07XXXXXXXX", 
                btnWa: "Send via WhatsApp", btnSms: "Send Direct SMS", 
                install: "📲 Add ADM Admin App?", alertNum: "Please enter a valid number!" 
            }
        };

        let currentLang = 'si';

        function changeLang(lang) {
            currentLang = lang;
            const t = translations[lang];
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('txt-subtitle').innerText = t.subtitle;
            document.getElementById('phone').placeholder = t.phonePh;
            document.getElementById('btn-wa').innerText = t.btnWa;
            document.getElementById('btn-sms').innerText = t.btnSms;
            document.getElementById('txt-install').innerText = t.install;
            
            document.querySelectorAll('.lang-btn').forEach(b => {
                b.classList.remove('active');
                if((lang === 'si' && b.innerText === 'සිංහල') || 
                   (lang === 'ta' && b.innerText === 'தமிழ்') || 
                   (lang === 'en' && b.innerText === 'English')) {
                    b.classList.add('active');
                }
            });
        }

        function execute(type) {
            const num = document.getElementById('phone').value;
            if (num.length < 10) return alert(translations[currentLang].alertNum);

            const link = "https://janithdidula025-design.github.io/ecard/index.html";
            const msgBody = `ඔබේ ADM Digital Student Card එක මෙතැනින් ලබාගන්න: ${link}`;

            if (type === 'wa') {
                // සෘජුවම අංකය සමඟ WhatsApp App එක Push කිරීම
                window.location.href = `whatsapp://send?phone=94${num.substring(1)}&text=${encodeURIComponent(msgBody)}`;
            } else {
                // SMS සඳහා (iOS/Android දෙකටම)
                const sep = (navigator.userAgent.match(/iPhone|iPad|iPod/i)) ? '&' : '?';
                window.location.href = `sms:${num}${sep}body=${encodeURIComponent(msgBody)}`;
            }
        }

        // PWA Installation
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-prompt').style.display = 'flex';
        });

        document.getElementById('btn-install').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                document.getElementById('install-prompt').style.display = 'none';
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,self.addEventListener("fetch", (e) => {});');
        }
    </script>
</body>
</html>
