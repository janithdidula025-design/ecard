<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADM Central | Control Panel</title>

    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkFETSBDZW50cmFsIiwKICAic2hvcnRf_uYW1lIjogIkFETUNlbnRyYWwiLAogICJzdGFydF91cmwiOiAiYWRtaW4uaHRtbCIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzBhMTkyZiIsCiAgInRoZW1lX2NvbG9yIjogIiM2NGZmZGEiLAogICJpY29ucyI6IFt7ICJzcmMiOiAiaHR0cHM6Ly9pbWcuaWNvbnM4LmNvbS9mbHVlbmN5LzUxMi9hZG1pbi1zZXR0aW5ncy5wbmciLCAic2l6ZXMiOiAiNTEyeDUxMiIsICJ0eXBlIjogImltYWdlL3BuZyIgfV0KfQ==">

    <style>
        :root {
            --accent: #64ffda;
            --bg-dark: #0a192f;
            --card-bg: #112240;
            --text-main: #ccd6f6;
            --text-dim: #8892b0;
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Install Banner */
        #install-prompt {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #000;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 9999;
            align-items: center;
            gap: 15px;
            width: 85%;
            max-width: 350px;
            justify-content: space-between;
        }

        #install-prompt button {
            background: #000;
            color: #fff;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }

        /* Header Area */
        header {
            width: 100%;
            padding: 40px 0 20px;
            text-align: center;
        }

        .main-card {
            width: 90%;
            max-width: 420px;
            background: var(--card-bg);
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(100, 255, 218, 0.1);
            text-align: center;
        }

        /* Image Upload Section */
        .profile-section {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .profile-section img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
            padding: 5px;
        }

        .upload-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: var(--accent);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        h2 { margin: 0; color: var(--accent); font-size: 1.5rem; letter-spacing: 2px; }
        p { color: var(--text-dim); font-size: 0.9rem; margin-top: 5px; }

        /* Form Styling */
        .input-group {
            margin-top: 30px;
            position: relative;
        }

        input[type="tel"] {
            width: 100%;
            background: rgba(2, 12, 27, 0.7);
            border: 2px solid #233554;
            border-radius: 12px;
            padding: 15px;
            color: var(--accent);
            font-size: 1.5rem;
            text-align: center;
            font-weight: bold;
            letter-spacing: 3px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input[type="tel"]:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 15px rgba(100, 255, 218, 0.1);
        }

        /* Action Buttons */
        .actions {
            display: grid;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: transform 0.2s;
        }

        .btn:active { transform: scale(0.98); }

        .btn-wa { background: #25D366; color: white; }
        .btn-sms { background: #007aff; color: white; }
        .btn-call { background: #ccd6f6; color: #0a192f; }

        footer {
            margin-top: auto;
            padding: 30px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <div id="install-prompt">
        <span>Install Admin App?</span>
        <button onclick="installApp()">එක් කරන්න</button>
    </div>

    <header>
        <div class="profile-section">
            <img id="logo-preview" src="https://raw.githubusercontent.com/janithdidula025-design/adm-vcard/main/logo.jpg" alt="Logo">
            <label for="file-upload" class="upload-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            </label>
            <input type="file" id="file-upload" accept="image/*" style="display:none" onchange="previewLogo(this)">
        </div>
        <h2>ADM CENTRAL</h2>
        <p>Management & Dispatch System</p>
    </header>

    <div class="main-card">
        <div class="input-group">
            <input type="tel" id="phone" placeholder="07XXXXXXXX" maxlength="10">
        </div>

        <div class="actions">
            <button class="btn btn-wa" onclick="execute('wa')">
                <span>WhatsApp Card</span>
            </button>
            <button class="btn btn-sms" onclick="execute('sms')">
                <span>Direct SMS</span>
            </button>
            <button class="btn btn-call" onclick="execute('call')">
                <span>Call Student</span>
            </button>
        </div>
    </div>

    <footer>
        &copy; 2026 ADM Education Unit
    </footer>

    <script>
        let deferredPrompt;

        // PWA Installation Logic
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-prompt').style.display = 'flex';
        });

        async function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                document.getElementById('install-prompt').style.display = 'none';
            }
        }

        // Logo Handler
        function previewLogo(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('logo-preview').src = e.target.result;
                    localStorage.setItem('adm_custom_logo', e.target.result);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Core Functions
        function execute(type) {
            const num = document.getElementById('phone').value;
            if (num.length < 10) return alert("කරුණාකර නිවැරදි අංකයක් ඇතුළත් කරන්න.");

            // GitHub Pages හෝ Local URL එක ස්වයංක්‍රීයව හඳුනාගනී
            const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
            const cardUrl = `${baseUrl}/index.html`;
            const message = encodeURIComponent(`ආයුබෝවන්! ADM පන්ති විස්තර ඇතුළත් ඔබේ ඩිජිටල් කාඩ්පත මෙතැනින් ලබාගන්න: ${cardUrl}`);

            switch(type) {
                case 'wa':
                    window.open(`https://wa.me/94${num.substring(1)}?text=${message}`, '_blank');
                    break;
                case 'sms':
                    window.open(`sms:${num}?body=${message}`);
                    break;
                case 'call':
                    window.open(`tel:${num}`);
                    break;
            }
        }

        // Initialize
        window.onload = () => {
            const savedLogo = localStorage.getItem('adm_custom_logo');
            if (savedLogo) document.getElementById('logo-preview').src = savedLogo;
            
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
            }
        };
    </script>
</body>
</html>
