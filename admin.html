<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADM Admin Panel</title>
    <link rel="manifest" href="manifest-admin.json">
    <style>
        body { margin: 0; background: #050811; color: white; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* Install Banner */
        #installBannerAdmin { display: none; width: 100%; background: #50e3c2; color: #000; padding: 12px; position: fixed; top: 0; z-index: 1000; font-weight: bold; justify-content: center; align-items: center; }
        #installBtnAdmin { background: #000; color: #fff; border: none; padding: 8px 15px; border-radius: 10px; margin-left: 10px; }

        .card { width: 90%; max-width: 400px; background: #111; padding: 30px; border-radius: 30px; border: 2px solid #50e3c2; }
        input { width: 100%; padding: 20px; margin: 20px 0; border-radius: 15px; border: none; font-size: 1.5rem; text-align: center; box-sizing: border-box; background: #222; color: #50e3c2; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; margin-bottom: 10px; }
        .btn-wa { background: #25D366; color: white; }
    </style>
</head>
<body>
    <div id="installBannerAdmin">
        📲 Admin App එක දාගන්න? <button id="installBtnAdmin">INSTALL</button>
    </div>

    <div class="card">
        <h2 style="color:#50e3c2;">ADM ADMIN PANEL</h2>
        <input type="tel" id="num" placeholder="07XXXXXXXX" maxlength="10">
        <button class="btn btn-wa" onclick="sendCard()">📲 SEND CARD (WA)</button>
    </div>

    <script>
        let defPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); defPrompt = e;
            document.getElementById('installBannerAdmin').style.display = 'flex';
        });

        document.getElementById('installBtnAdmin').addEventListener('click', async () => {
            if (defPrompt) {
                defPrompt.prompt();
                document.getElementById('installBannerAdmin').style.display = 'none';
            }
        });

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        
        function sendCard() {
            let n = document.getElementById('num').value;
            if(n.length < 10) return alert("අංකය පරීක්ෂා කරන්න!");
            let link = window.location.href.replace('admin.html', 'index.html');
            window.open(`https://wa.me/94${n.substring(1)}?text=මෙන්න ADM Digital Card එක: ${link}`);
        }
    </script>
</body>
</html>
