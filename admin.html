<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADM Admin Panel</title>
    <link rel="manifest" href="admin-manifest.json">
    <style>
        :root { --primary: #50e3c2; --bg-dark: #050811; }
        body { 
            font-family: sans-serif; background: var(--bg-dark);
            background-image: linear-gradient(rgba(5, 8, 17, 0.8), rgba(5, 8, 17, 0.8)), url('https://www.transparenttextures.com/patterns/cubes.png');
            color: white; text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }
        .card { background: rgba(18, 24, 43, 0.95); padding: 40px 25px; border-radius: 40px; border: 2px solid var(--primary); max-width: 400px; width: 90%; position: relative; overflow: hidden; }
        .logo-container { cursor: pointer; margin-bottom: 15px; position: relative; display: inline-block; }
        .logo-preview { width: 130px; height: 130px; border-radius: 50%; border: 4px solid var(--primary); object-fit: cover; }
        input[type="tel"] { width: 100%; padding: 20px; border-radius: 20px; border: 2px solid #333; background: #000; color: var(--primary); text-align: center; font-size: 2rem; font-weight: bold; outline: none; margin-bottom: 20px; box-sizing: border-box; }
        .btn { width: 100%; padding: 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-wa { background: #25D366; color: white; }
        .btn-sms { background: #fff; color: #000; }
        #lockScreen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <div class="card">
        <div id="lockScreen">
            <h2 style="color: #ff4757;">⛔ ACCESS LOCKED</h2>
            <p>1,000,000 සීමාව ඉක්මවා ඇත.</p>
        </div>
        <div class="logo-container" onclick="document.getElementById('fileInp').click()">
            <img id="prev" src="https://raw.githubusercontent.com/janithdidula025-design/adm-vcard/main/logo.jpg" class="logo-preview">
        </div>
        <input type="file" id="fileInp" accept="image/*" style="display: none;" onchange="handleImage(this)">
        <h3>ADM ADMIN APP</h3>
        <input type="tel" id="phone" placeholder="07XXXXXXXX" inputmode="numeric" maxlength="10">
        <button class="btn btn-wa" onclick="send('wa')">📲 SEND WHATSAPP</button>
        <button class="btn btn-sms" onclick="send('sms')">💬 SEND SMS</button>
        <div style="font-size:0.8rem; color:#ff4757; margin-top:20px;" id="usageInfo">භාවිතය: 0 / 1,000,000</div>
    </div>
    <script>
        const MAX_LIMIT = 1000000;
        window.onload = () => {
            updateUI();
            if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
        };
        function handleImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    localStorage.setItem('adm_logo_data', e.target.result);
                    document.getElementById('prev').src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        function updateUI() {
            let count = parseInt(localStorage.getItem('adm_send_count')) || 0;
            let savedImg = localStorage.getItem('adm_logo_data');
            document.getElementById('usageInfo').innerText = `භාවිතය: ${count.toLocaleString()} / 1,000,000`;
            if(savedImg) document.getElementById('prev').src = savedImg;
            if(count >= MAX_LIMIT) document.getElementById('lockScreen').style.display = 'flex';
        }
        function send(mode) {
            let count = parseInt(localStorage.getItem('adm_send_count')) || 0;
            if(count >= MAX_LIMIT) return;
            let num = document.getElementById('phone').value;
            if(num.length < 10) return alert("අංකය පරීක්ෂා කරන්න!");
            localStorage.setItem('adm_send_count', count + 1);
            updateUI();
            let link = window.location.href.replace('admin.html', 'index.html');
            let msg = encodeURIComponent(`ආයුබෝවන්! 👋\nADM Higher Education Digital E-Card: ${link}`);
            if(mode === 'wa') {
                let f = num.startsWith('0') ? '94' + num.substring(1) : num;
                window.open(`https://wa.me/${f}?text=${msg}`);
            } else { window.open(`sms:${num}?body=${msg}`); }
        }
    </script>
</body>
</html>
