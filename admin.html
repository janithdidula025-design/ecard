<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/janithdidula025-design/adm-vcard/main/logo.jpg">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/janithdidula025-design/adm-vcard/main/logo.jpg">

    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkFETSBBZG1pbiIsCiAgInNob3J0X25hbWUiOiAiQURNIEFkbWluIiwKICAic3RhcnRfdXJsIjogIi4vYWRtaW4uaHRtbCIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgIm9yaWVudGF0aW9uIjogInBvcnRyYWl0IiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMGExOTJmIiwKICAidGhlbWVfY29sb3IiOiAiIzY0ZmZkYSIsCiAgImljb25zIjogWwogICAgewogICAgICAic3JjIjogImh0dHBzOi8vcmF3LmdpdGh1YnVzZXJjb250ZW50LmNvbS9qYW5pdGhkaWR1bGEwMjUtZGVzaWduL2FkbS12Y2FyZC9tYWluL2xvZ28uanBnIiwKICAgICAgInNpemVzIjogIjUxMng1MTIiLAogICAgICAidHlwZSI6ICJpbWAGEvcG5nIiwKICAgICAgInB1cnBvc2UiOiAiYW55IG1hc2thYmxlIgogICAgfQogIF0KfQ==">

    <style>
        :root { --accent: #64ffda; --bg-dark: #0a192f; --card-bg: #112240; --text-main: #ccd6f6; }
        body { margin: 0; background-color: var(--bg-dark); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-top: 80px; }

        #install-prompt {
            display: none; position: fixed; top: 0; left: 0; background: var(--accent); color: #020c1b;
            padding: 15px; font-weight: bold; width: 100%; z-index: 10000; justify-content: space-around; align-items: center;
        }

        #install-prompt button { background: #020c1b; color: var(--accent); border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .profile-section { position: relative; width: 110px; height: 110px; margin-bottom: 20px; }
        .profile-section img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; }

        .main-card { width: 85%; max-width: 380px; background: var(--card-bg); padding: 30px 20px; border-radius: 28px; text-align: center; }

        input { width: 100%; background: #020c1b; border: 2px solid #233554; border-radius: 16px; padding: 18px; color: var(--accent); font-size: 1.5rem; text-align: center; margin-bottom: 20px; outline: none; box-sizing: border-box; }

        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-wa { background: #25D366; color: white; }
        .btn-sms { background: #1d9bf0; color: white; }
        .btn-call { background: #fff; color: #000; }
    </style>
</head>
<body>

    <div id="install-prompt">
        <span>ADM Admin App එක එක් කරන්න?</span>
        <button id="btn-install">එක් කරන්න</button>
    </div>

    <div class="profile-section">
        <img id="logo-preview" src="https://raw.githubusercontent.com/janithdidula025-design/adm-vcard/main/logo.jpg">
    </div>

    <div class="main-card">
        <input type="tel" id="phone" placeholder="07XXXXXXXX" maxlength="10">
        <button class="btn btn-wa" onclick="execute('wa')">WhatsApp Link Send</button>
        <button class="btn btn-sms" onclick="execute('sms')">SMS Send</button>
        <button class="btn btn-call" onclick="execute('call')">Call Now</button>
    </div>

    <script>
        let deferredPrompt;

        // Service Worker එක Register කිරීම (Install වීමට මෙය අත්‍යවශ්‍යයි)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('SW Registered');
                }).catch(err => console.log('SW Failed', err));
            });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-prompt').style.display = 'flex';
        });

        document.getElementById('btn-install').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                document.getElementById('install-prompt').style.display = 'none';
            }
        });

        function execute(type) {
            const num = document.getElementById('phone').value;
            if (num.length < 10) return alert("අංකය නිවැරදිව ඇතුළත් කරන්න.");

            let cardUrl = "https://janithdidula025-design.github.io/index.html";
            const msg = encodeURIComponent(`ඔබේ ADM Digital Card එක ලබාගන්න: ${cardUrl}`);

            if(type === 'wa') window.open(`https://wa.me/94${num.substring(1)}?text=${msg}`);
            if(type === 'sms') window.open(`sms:${num}?body=${msg}`);
            if(type === 'call') window.open(`tel:${num}`);
        }
    </script>
</body>
</html>
