    <style>
        /* CSS Variables for Consistency */
        :root { 
            --accent: #64ffda; 
            --accent-glow: rgba(100, 255, 218, 0.3);
            --bg-dark: #020c1b; 
            --card-bg: rgba(17, 34, 64, 0.7); 
            --text-main: #ccd6f6; 
            --text-bright: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { 
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background: radial-gradient(circle at top right, #112240, #020c1b);
            color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
        }

        body { display: flex; flex-direction: column; align-items: center; padding: env(safe-area-inset-top) 15px 20px 15px; }
        
        /* Premium Install Prompt */
        #install-prompt { 
            display: none; position: fixed; bottom: 20px; left: 15px; right: 15px;
            background: var(--accent); color: #020c1b; padding: 15px; 
            border-radius: 20px; z-index: 10000; justify-content: space-between; 
            align-items: center; font-weight: 800; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #install-prompt button { 
            background: #020c1b; color: var(--accent); border: none; 
            padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 900; 
        }

        /* Language Switcher */
        .lang-bar { display: flex; gap: 8px; margin: 15px 0; background: var(--glass); padding: 5px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); }
        .lang-btn { 
            background: transparent; border: none; color: var(--text-main); 
            padding: 8px 16px; border-radius: 50px; cursor: pointer; font-size: 0.75rem; 
            transition: 0.3s; font-weight: 600;
        }
        .lang-btn.active { background: var(--accent); color: #020c1b; }

        /* Header Section */
        .header { text-align: center; margin-bottom: 20px; animation: fadeIn 1s ease; }
        .profile-ring { 
            width: 90px; height: 90px; border-radius: 50%; padding: 3px;
            background: linear-gradient(45deg, var(--accent), transparent);
            margin: 0 auto 10px;
        }
        .profile-ring img { 
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover; 
            background: var(--bg-dark); border: 2px solid var(--bg-dark);
        }

        h2 { margin: 0; font-size: 1.5rem; color: var(--text-bright); letter-spacing: 2px; }
        .subtitle { color: var(--accent); font-size: 0.7rem; letter-spacing: 4px; font-weight: 700; opacity: 0.8; text-transform: uppercase; }

        /* Main Scrollable Area */
        .content-area {
            width: 100%; max-width: 400px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 20px;
            padding-bottom: 40px; scrollbar-width: none;
        }
        .content-area::-webkit-scrollbar { display: none; }

        /* Glass Cards */
        .card { 
            background: var(--card-bg); border-radius: 30px; padding: 25px;
            border: 1px solid rgba(100, 255, 218, 0.1);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        
        .label { color: var(--accent); font-size: 0.75rem; font-weight: 700; margin-bottom: 15px; display: block; text-transform: uppercase; letter-spacing: 1px; }

        input, textarea { 
            width: 100%; background: rgba(2, 12, 27, 0.5); border: 1.5px solid #233554; 
            border-radius: 18px; color: var(--accent); padding: 15px;
            outline: none; transition: 0.3s; font-family: inherit; font-size: 1rem;
        }
        input[type="tel"] { font-size: 2.2rem; font-weight: 800; text-align: center; letter-spacing: 3px; }
        textarea { height: 100px; text-align: left; resize: none; margin-top: 10px; }
        
        input:focus, textarea:focus { border-color: var(--accent); background: rgba(2, 12, 27, 0.8); box-shadow: 0 0 15px var(--accent-glow); }

        /* Action Buttons */
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .btn { 
            width: 100%; padding: 18px; border-radius: 18px; border: none;
            font-weight: 800; cursor: pointer; font-size: 0.85rem; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            color: white; transition: 0.3s; text-transform: uppercase;
        }
        .btn-wa { background: #25D366; box-shadow: 0 5px 20px rgba(37, 211, 102, 0.3); }
        .btn-sms { background: #1d9bf0; box-shadow: 0 5px 20px rgba(29, 155, 240, 0.3); }
        .btn-push { background: linear-gradient(90deg, #ff4b2b, #ff416c); margin-top: 10px; }
        
        .btn:active { transform: scale(0.95); opacity: 0.8; }

        .footer { margin-top: auto; padding: 20px; font-size: 0.75rem; opacity: 0.5; letter-spacing: 1px; }
        .footer b { color: var(--accent); }

        /* Animations */
        @keyframes slideUp { from { transform: translateY(100px); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <div id="install-prompt">
        <span id="txt-install">📲 ADM Admin App එක එක් කරන්න?</span>
        <button id="btn-install">INSTALL</button>
    </div>

    <div class="lang-bar">
        <button class="lang-btn active" onclick="changeLang('si')">සිංහල</button>
        <button class="lang-btn" onclick="changeLang('ta')">தமிழ்</button>
        <button class="lang-btn" onclick="changeLang('en')">English</button>
    </div>

    <div class="header">
        <div class="profile-ring">
            <img src="https://raw.githubusercontent.com/janithdidula025-design/ecard/main/logo.png" alt="ADM">
        </div>
        <h2 id="txt-title">ADM CENTRAL</h2>
        <div id="txt-subtitle" class="subtitle">MANAGEMENT SYSTEM</div>
    </div>

    <div class="content-area">
        <div class="card">
            <span class="label">Quick Dispatch</span>
            <input type="tel" id="phone" placeholder="07XXXXXXXX" maxlength="10">
            <div class="btn-group">
                <button class="btn btn-wa" id="btn-wa" onclick="execute('wa')">
                    WhatsApp Link
                </button>
                <button class="btn btn-sms" id="btn-sms" onclick="execute('sms')">
                    Direct SMS
                </button>
            </div>
        </div>
        
        <div class="card">
            <span class="label">Broadcast Notification</span>
            <textarea id="notif-body" placeholder="සිසුන් සඳහා වූ විශේෂ පණිවිඩය මෙතන ලියන්න..."></textarea>
            <button class="btn btn-push" onclick="sendNotification()">
                Send to All Students
            </button>
        </div>
    </div>

    <div class="footer">
        POWERED BY <b>JANITH DIDULA</b>
    </div>

    <script>
        const translations = {
            si: { title: "ADM CENTRAL", subtitle: "MANAGEMENT SYSTEM", phonePh: "07XXXXXXXX", btnWa: "WhatsApp Link", btnSms: "Direct SMS", install: "📲 ADM App එක එක් කරන්න?", alertNum: "කරුණාකර නිවැරදි අංකයක් ඇතුළත් කරන්න!", alertPush: "මාතෘකාව සහ පණිවිඩය ඇතුළත් කරන්න!" },
            ta: { title: "ADM CENTRAL", subtitle: "மேலாண்மை அமைப்பு", phonePh: "07XXXXXXXX", btnWa: "வாட்ஸ்அப்", btnSms: "எஸ்எம்எஸ்", install: "📲 ADM பயன்பாட்டைச் சேர்க்கவா?", alertNum: "சரியான எண்ணை ඇතුළත් කරන්න!", alertPush: "செய்தியை உள்ளிடவும்!" },
            en: { title: "ADM CENTRAL", subtitle: "MANAGEMENT SYSTEM", phonePh: "07XXXXXXXX", btnWa: "WhatsApp Link", btnSms: "Direct SMS", install: "📲 Add ADM App?", alertNum: "Invalid Number!", alertPush: "Fill all fields!" }
        };

        let currentLang = 'si';

        function changeLang(lang) {
            currentLang = lang;
            const t = translations[lang];
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('txt-subtitle').innerText = t.subtitle;
            document.getElementById('phone').placeholder = t.phonePh;
            document.getElementById('btn-wa').innerText = t.btnWa;
            document.getElementById('btn-sms').innerText = t.btnSms;
            document.getElementById('txt-install').innerText = t.install;
            
            document.querySelectorAll('.lang-btn').forEach(b => {
                b.classList.remove('active');
                if(b.innerText.toLowerCase().includes(lang === 'si' ? 'සිං' : lang === 'ta' ? 'த' : 'eng')) {
                    b.classList.add('active');
                }
            });
        }

        function execute(type) {
            let num = document.getElementById('phone').value.trim();
            num = num.replace(/\s+/g, '');
            if (num.startsWith('+94')) num = '0' + num.substring(3);
            if (num.startsWith('94')) num = '0' + num.substring(2);

            if (num.length < 10) return alert(translations[currentLang].alertNum);

            const link = "https://janithdidula025-design.github.io/ecard/index.html";
            const msgBody = `ඔබේ ADM Digital Student Card එක මෙතැනින් ලබාගන්න: ${link}`;

            if (type === 'wa') {
                window.location.href = `whatsapp://send?phone=94${num.substring(1)}&text=${encodeURIComponent(msgBody)}`;
            } else {
                const sep = (navigator.userAgent.match(/iPhone|iPad|iPod/i)) ? '&' : '?';
                window.location.href = `sms:${num}${sep}body=${encodeURIComponent(msgBody)}`;
            }
        }

        function sendNotification() {
            const title = document.getElementById('notif-title').value;
            const body = document.getElementById('notif-body').value;
            if (!title || !body) return alert(translations[currentLang].alertPush);
            
            alert("Sending: " + title);
            // Firebase push logic goes here
        }

        // PWA logic
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-prompt').style.display = 'flex';
        });

        document.getElementById('btn-install').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                document.getElementById('install-prompt').style.display = 'none';
            }
        });
    </script>

                    });
                }
            } catch (err) { console.log(err); }
