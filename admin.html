<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADM Admin Panel</title>
    <link rel="manifest" href="manifest-admin.json">
    <meta name="theme-color" content="#50e3c2">
    <style>
        body { margin: 0; background: #050811; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { width: 90%; max-width: 400px; background: #111; padding: 30px; border-radius: 30px; border: 2px solid #50e3c2; text-align: center; }
        input { width: 100%; padding: 20px; margin: 20px 0; border-radius: 15px; border: none; font-size: 1.5rem; text-align: center; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; margin-bottom: 10px; }
        .btn-wa { background: #25D366; color: white; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#50e3c2;">ADM ADMIN</h2>
        <input type="tel" id="num" placeholder="07XXXXXXXX" maxlength="10">
        <button class="btn btn-wa" onclick="sendCard()">📲 SEND VIA WHATSAPP</button>
    </div>
    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        function sendCard() {
            let n = document.getElementById('num').value;
            if(n.length < 10) return alert("අංකය වැරදියි!");
            let link = window.location.href.replace('admin.html', 'index.html');
            window.open(`https://wa.me/94${n.substring(1)}?text=මෙන්න ADM Digital Card එක: ${link}`);
        }
    </script>
</body>
</html>
