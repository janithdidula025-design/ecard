<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADM Admin Panel</title>
    <link rel="manifest" href="manifest-admin.json">
    <meta name="theme-color" content="#50e3c2">
    <style>
        :root { --primary: #50e3c2; --bg-dark: #050811; }
        body { 
            font-family: sans-serif; background: var(--bg-dark);
            background-image: linear-gradient(rgba(5, 8, 17, 0.8), rgba(5, 8, 17, 0.8)), url('https://www.transparenttextures.com/patterns/cubes.png');
            color: white; text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }
        .card { background: rgba(18, 24, 43, 0.95); padding: 40px 25px; border-radius: 40px; border: 2px solid var(--primary); max-width: 400px; width: 90%; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* ලෝගෝ එක ලස්සන කරන CSS */
        .logo-container { cursor: pointer; margin-bottom: 25px; position: relative; display: inline-block; }
        .logo-preview { 
            width: 130px; 
            height: 130px; 
            border-radius: 50%; 
            border: 4px solid var(--primary); 
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(80, 227, 194, 0.4); /* අලංකාර shadow එකක් */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: logo-load 0.6s ease-out forwards; /* Load වන විට animation */
            opacity: 0;
        }
        @keyframes logo-load {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .logo-preview:active { transform: scale(0.95); box-shadow: 0 2px 10px rgba(80, 227, 194, 0.2); }

        input[type="tel"] { width: 100%; padding: 20px; border-radius: 20px; border: 2px solid #333; background: #000; color: var(--primary); text-align: center; font-size: 2rem; font-weight: bold; outline: none; margin-bottom: 20px; box-sizing: border-box; }
        .btn { width: 100%; padding: 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-wa { background: #25D366; color: white; }
        .btn-call { background: #fff; color: #000; }
        #usageInfo { font-size:0.8rem; color:#ff4757; margin-top:20px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-container" onclick="document.getElementById('fileInp').click()">
            <img id="prev" src="https://raw.githubusercontent.com/janithdidula025-design/adm-vcard/main/logo.jpg" class="logo-preview">
        </div>
        <input type="file" id="fileInp" accept="image/*" style="display: none;" onchange="handleImage(this)">
        <h3>ADM ADMIN APP</h3>
        <input type="tel" id="phone" placeholder="07XXXXXXXX" inputmode="numeric" maxlength="10">
        <button class="btn btn-wa" onclick="send('wa')">📲 SEND CARD (WA)</button>
        <button class="btn btn-call" onclick="send('call')">📞 CALL CUSTOMER</button>
        <div id="usageInfo">භාවිතය: 0 / 1,000,000</div>
    </div>
    <script>
        window.onload = () => {
            updateUI();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js');
            }
        };
        function handleImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    localStorage.setItem('adm_logo_data', e.target.result);
                    document.getElementById('prev').src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        function updateUI() {
            let count = parseInt(localStorage.getItem('adm_send_count')) || 0;
            let savedImg = localStorage.getItem('adm_logo_data');
            document.getElementById('usageInfo').innerText = `භාවිතය: ${count.toLocaleString()} / 1,000,000`;
            if(savedImg) document.getElementById('prev').src = savedImg;
        }
        function send(type) {
            let n = document.getElementById('phone').value;
            if(n.length < 10) return alert("කරුණාකර නිවැරදි අංකයක් ඇතුළත් කරන්න!");
            
            let cardLink = window.location.href.replace('admin.html', 'index.html');
            let message = encodeURIComponent(`ආයුබෝවන්! මෙන්න ADM Higher Education Digital Card එක: ${cardLink}`);

            if(type === 'wa') {
                let count = parseInt(localStorage.getItem('adm_send_count')) || 0;
                localStorage.setItem('adm_send_count', count + 1);
                updateUI();
                window.open(`https://wa.me/94${n.substring(1)}?text=${message}`);
            } else if(type === 'call') {
                window.open(`tel:${n}`);
            }
        }
    </script>
</body>
</html>
