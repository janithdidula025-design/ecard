<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADM Admin Panel</title>
    <meta name="theme-color" content="#0a192f">
    <link rel="manifest" href='data:application/json,{"name":"ADM Admin","short_name":"ADM Admin","start_url":"admin.html","display":"standalone","background_color":"#0a192f","theme_color":"#64ffda","icons":[{"src":"https://raw.githubusercontent.com/janithdidula025-design/adm-vcard/main/logo.jpg","sizes":"512x512","type":"image/jpg"}]}'>

    <style>
        :root { --accent: #64ffda; --bg-dark: #0a192f; --card-bg: #112240; --text-main: #ccd6f6; }
        body { margin: 0; background-color: var(--bg-dark); color: var(--text-main); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-top: 50px; }
        
        #install-prompt { display: none; position: fixed; top: 0; background: var(--accent); color: #020c1b; padding: 15px; width: 100%; z-index: 10000; justify-content: space-around; align-items: center; font-weight: bold; }
        #install-prompt button { background: #020c1b; color: var(--accent); border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }

        .profile-section { width: 120px; height: 120px; margin-bottom: 20px; position: relative; cursor: pointer; }
        .profile-section img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; background: var(--card-bg); }
        .edit-badge { position: absolute; bottom: 5px; right: 5px; background: var(--accent); color: #000; font-size: 10px; padding: 3px 6px; border-radius: 10px; font-weight: bold; }

        .main-card { width: 85%; max-width: 380px; background: var(--card-bg); padding: 30px 20px; border-radius: 28px; border: 1px solid rgba(100, 255, 218, 0.1); text-align: center; }
        input { width: 100%; background: #020c1b; border: 2px solid #233554; border-radius: 16px; padding: 15px; color: var(--accent); font-size: 1.5rem; text-align: center; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 12px; transition: 0.3s; }
        .btn-wa { background: #25D366; color: white; }
        .btn-sms { background: #1d9bf0; color: white; }
        .btn-call { background: #ffffff; color: #0a192f; }
    </style>
</head>
<body>

    <div id="install-prompt">
        <span>📲 ADM Admin App එක එක් කරන්න?</span>
        <button id="btn-install">එක් කරන්න</button>
    </div>

    <div class="profile-section" onclick="document.getElementById('logo-input').click()">
        <img id="admin-logo" src="https://raw.githubusercontent.com/janithdidula025-design/ecard/main/logo.jpg">
        <div class="edit-badge">EDIT</div>
        <input type="file" id="logo-input" hidden accept="image/*" onchange="updateLogo(this)">
    </div>
    
    <h2>ADM CENTRAL</h2>
    <p style="color:var(--accent)">MANAGEMENT & DISPATCH</p>

    <div class="main-card">
        <input type="tel" id="phone" placeholder="07XXXXXXXX" maxlength="10">
        <button class="btn btn-wa" onclick="execute('wa')">WhatsApp Link Send</button>
        <button class="btn btn-sms" onclick="execute('sms')">Direct SMS Send</button>
        <button class="btn btn-call" onclick="execute('call')">Call Student</button>
    </div>

    <script>
        function updateLogo(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64 = e.target.result;
                    document.getElementById('admin-logo').src = base64;
                    localStorage.setItem('adm_shared_logo', base64);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('adm_shared_logo');
            if (saved) document.getElementById('admin-logo').src = saved;
            if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
        };

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('install-prompt').style.display = 'flex';
        });

        document.getElementById('btn-install').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                document.getElementById('install-prompt').style.display = 'none';
            }
        });

        function execute(type) {
            const num = document.getElementById('phone').value;
            if (num.length < 10) return alert("අංකය වැරදියි!");
            const link = "https://janithdidula025-design.github.io/ecard/index.html";
            const msg = encodeURIComponent(`ඔබේ ADM Digital Student Card එක මෙතැනින් ලබාගන්න: ${link}`);
            if(type === 'wa') window.open(`https://wa.me/94${num.substring(1)}?text=${msg}`);
            if(type === 'sms') window.open(`sms:${num}?body=${msg}`);
            if(type === 'call') window.open(`tel:${num}`);
        }
    </script>
</body>
</html>
