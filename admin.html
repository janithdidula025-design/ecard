<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADM Digital Card</title>
    <link rel="manifest" href="manifest-card.json">
    <meta name="theme-color" content="#0a192f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { --primary: #50e3c2; --gold: #ffd700; --dark-blue: #0a192f; }
        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; 
            background: radial-gradient(circle at top, #112240, #0a192f);
            color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center;
        }

        /* Browser එකෙන් Install කරන්න අහන Banner එක */
        #pwa-installer { 
            display: none; width: 100%; background: var(--primary); color: #000; 
            padding: 12px; position: fixed; top: 0; z-index: 1000; font-weight: bold;
            justify-content: space-around; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #pwa-installer button { background: #000; color: #fff; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .card { 
            width: 88%; max-width: 360px; background: rgba(255, 255, 255, 0.05); 
            padding: 35px 20px; border-radius: 35px; border: 1px solid rgba(80, 227, 194, 0.2); 
            backdrop-filter: blur(15px); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        
        .p-img { width: 125px; height: 125px; border-radius: 50%; object-fit: cover; border: 3px solid var(--gold); padding: 4px; background: #0a192f; margin-bottom: 15px; }

        .inst-name { color: var(--primary); font-size: 0.8rem; letter-spacing: 2px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        h2 { margin: 5px 0; font-size: 1.7rem; letter-spacing: 1px; }
        .pos { color: var(--gold); font-size: 0.95rem; margin-bottom: 20px; font-weight: 500; }
        
        /* කලින් තිබ්බ Info Box එක */
        .info-box { 
            background: rgba(0,0,0,0.25); padding: 18px; border-radius: 20px; 
            margin-bottom: 25px; border-left: 4px solid var(--primary); 
            text-align: left; font-size: 0.9rem; line-height: 1.6;
        }

        .btn { width: 100%; padding: 16px; border-radius: 18px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.05rem; margin-bottom: 12px; border: none; cursor: pointer; transition: 0.2s; }
        .btn-wa { background: #25D366; color: #fff; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3); }
        .btn-save { background: #fff; color: #0a192f; }
        .btn:active { transform: scale(0.97); }

        .wa-icon { width: 22px; height: 22px; fill: white; }
    </style>
</head>
<body>

    <div id="pwa-installer">
        <span>📲 පහසුව සඳහා App එකක් ලෙස එක් කරන්න?</span>
        <button id="btn-install">එක් කරන්න</button>
    </div>

    <div class="card">
        <div class="inst-name">ADM Higher Education</div>
        <img id="cardLogo" src="https://raw.githubusercontent.com/janithdidula025-design/adm-vcard/main/logo.jpg" class="p-img">
        
        <h2>JANITH DIDULA</h2>
        <div class="pos">Organizer / Manager</div>
        
        <div class="info-box">
            📍 මීගමුව පාර, නාරම්මල (ADM Institute)<br>
            🎓 Individual & Group Classes<br>
            📞 071 065 8051
        </div>

        <a href="https://wa.me/94710658051" class="btn btn-wa">
            <svg class="wa-icon" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.06 3.973L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/></svg>
            WHATSAPP සම්බන්ධ වන්න
        </a>
        <button onclick="saveContact()" class="btn btn-save">👤 CONTACT එක SAVE කරන්න</button>
    </div>

    <script>
        // PWA Install Logic
        let deferredPrompt;
        const installer = document.getElementById('pwa-installer');
        const installBtn = document.getElementById('btn-install');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installer.style.display = 'flex'; // Browser එකෙන් Prompt එක දෙනකොට Banner එක පෙන්වනවා
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installer.style.display = 'none';
                deferredPrompt = null;
            }
        });

        // Service Worker Register
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function saveContact() {
            const v = `BEGIN:VCARD\nVERSION:3.0\nFN:Janith Didula (ADM)\nTEL:0710658051\nEND:VCARD`;
            const b = new Blob([v], {type:'text/vcard'});
            const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download='Janith_ADM.vcf'; a.click();
        }
    </script>
</body>
</html>
