<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM Student Card</title>
    <link rel="manifest" href="manifest-card.json">
    <style>
        :root { --primary: #50e3c2; --gold: #ffd700; --dark-blue: #0a192f; }
        body { margin: 0; background: var(--dark-blue); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        #install-btn { display: none; background: var(--primary); color: black; padding: 10px 20px; border-radius: 10px; border: none; font-weight: bold; position: fixed; top: 10px; cursor: pointer; z-index: 100; }

        .card { width: 90%; max-width: 350px; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 30px; text-align: center; border: 1px solid rgba(80,227,194,0.2); backdrop-filter: blur(10px); }
        .p-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 15px; }

        .btn-wa { background: #25D366; color: white; text-decoration: none; padding: 15px; border-radius: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; margin-top: 20px; }
        .wa-dot { width: 12px; height: 12px; background: white; border-radius: 50%; }
    </style>
</head>
<body>

<button id="install-btn">INSTALL APP</button>

<div class="card">
    <img id="cardLogo" src="https://raw.githubusercontent.com/janithdidula025-design/adm-vcard/main/logo.jpg" class="p-img">
    <h2>JANITH DIDULA</h2>
    <p>Organizer / Manager</p>
    
    <div style="text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; font-size: 0.9rem;">
        📍 මීගමුව පාර, නාරම්මල<br>📞 071 065 8051
    </div>

    <a href="https://wa.me/94710658051" class="btn-wa">
        <span class="wa-dot"></span> WHATSAPP සම්බන්ධ වන්න
    </a>
</div>

<script>
    // Logo එක පෙන්වීම
    window.onload = () => {
        let logo = localStorage.getItem('adm_logo_data');
        if(logo) document.getElementById('cardLogo').src = logo;
    };

    // PWA Install Logic
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('install-btn').style.display = 'block';
    });

    document.getElementById('install-btn').addEventListener('click', () => {
        if(deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => {
                document.getElementById('install-btn').style.display = 'none';
            });
        }
    });

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
    }
</script>
</body>
</html>
