<html lang="si">
<head>

    <meta name="theme-color" content="#50e3c2">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        :root { --primary: #50e3c2; --bg: #050811; --card: #112240; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; overflow-x: hidden; }
        
        #pwa-admin-inst { display: none; width: 100%; background: #fff; color: #000; padding: 12px; position: fixed; top: 0; z-index: 1000; font-weight: bold; justify-content: space-around; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        .dashboard { width: 90%; max-width: 400px; background: var(--card); padding: 30px 20px; border-radius: 40px; border: 1px solid var(--primary); text-align: center; box-shadow: 0 10px 40px rgba(80, 227, 194, 0.1); margin-top: 50px; }
        .admin-logo { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; }

        input[type="tel"] { width: 100%; padding: 18px; margin: 20px 0; border-radius: 15px; border: 2px solid #233554; background: #0a192f; color: var(--primary); font-size: 1.8rem; text-align: center; font-weight: bold; outline: none; box-sizing: border-box; }
        
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-wa { background: #25D366; color: white; }
        .btn-sms { background: #007aff; color: white; }
        .btn-call { background: #ccd6f6; color: #0a192f; }
    </style>
</head>
<body>

    <div id="pwa-admin-inst">
        <span>📲 ADM Admin App එක එක් කරන්න?</span>
        <button id="btn-admin-install" style="background:#000;color:#fff;padding:8px 15px;border:none;border-radius:8px; cursor:pointer;">INSTALL</button>
    </div>

    <div class="dashboard">
        <img id="prev" src="https://raw.githubusercontent.com/janithdidula025-design/adm-vcard/main/logo.jpg" class="admin-logo">
        <div style="color:var(--primary); font-size:1.1rem; font-weight:bold; margin: 10px 0;">ADM ADMIN PANEL</div>
        
        <input type="tel" id="num" placeholder="07XXXXXXXX" maxlength="10">
        
        <div class="btn-group">
            <button class="btn btn-wa" onclick="sendAction('wa')">📲 SEND CARD (WhatsApp)</button>
            <button class="btn btn-sms" onclick="sendAction('sms')">💬 SEND SMS</button>
            <button class="btn btn-call" onclick="sendAction('call')">📞 CALL STUDENT</button>
        </div>
    </div>

    <script>
        let adminPrompt;
        window.onload = () => {
            if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
        };

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            adminPrompt = e;
            document.getElementById('pwa-admin-inst').style.display = 'flex';
        });

        document.getElementById('btn-admin-install').addEventListener('click', async () => {
            if(adminPrompt) {
                adminPrompt.prompt();
                adminPrompt = null;
                document.getElementById('pwa-admin-inst').style.display = 'none';
            }
        });

        function sendAction(type) {
            let n = document.getElementById('num').value;
            if(n.length < 10) return alert("අංකය පරීක්ෂා කරන්න!");
            let link = window.location.href.replace('admin.html', 'index.html');
            let msg = encodeURIComponent(`ආයුබෝවන්! ADM පන්ති විස්තර මෙතැනින් ලබාගන්න: ${link}`);
            if(type==='wa') window.open(`https://wa.me/94${n.substring(1)}?text=${msg}`);
            else if(type==='call') window.open(`tel:${n}`);
            else if(type==='sms') window.open(`sms:${n}?body=${msg}`);
        }
    </script>
</body>
</html>
