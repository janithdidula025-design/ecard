<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADM Central | Control Panel</title>

    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkFETSBDZW50cmFsIiwKICAic2hvcnRfbmFtZSI6ICJBRE1DZW50cmFsIiwKICAic3RhcnRfdXJsIjogImFkbWluLmh0bWwiLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIzBhMTkyZiIsCiAgInRoZW1lX2NvbG9yIjogIiM2NGZmZGEiLAogICJpY29ucyI6IFt7ICJzcmMiOiAiaHR0cHM6Ly9pbWcuaWNvbnM4LmNvbS9mbHVlbmN5LzUxMi9hZG1pbi1zZXR0aW5ncy5wbmciLCAic2l6ZXMiOiAiNTEyeDUxMiIsICJ0eXBlIjogImltYWdlL3BuZyIgfV0KfQ==">

    <style>
        :root {
            --accent: #64ffda; /* Neon Green */
            --bg-dark: #0a192f; /* Deep Navy */
            --card-bg: #112240; /* Lighter Navy */
            --text-main: #ccd6f6;
            --text-dim: #8892b0;
            --white: #ffffff;
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Install Banner */
        #install-prompt {
            display: none;
            position: fixed;
            top: 20px;
            background: var(--accent);
            color: #020c1b;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 9999;
            align-items: center;
            gap: 15px;
            width: 85%;
            max-width: 350px;
            justify-content: space-between;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from { transform: translateY(-100px); }
            to { transform: translateY(0); }
        }

        #install-prompt button {
            background: #020c1b;
            color: var(--accent);
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        header {
            width: 100%;
            padding: 50px 0 30px;
            text-align: center;
        }

        .profile-section {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 15px;
        }

        .profile-section img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
            padding: 4px;
            background: var(--card-bg);
        }

        .upload-btn {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: var(--accent);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 2px solid var(--bg-dark);
        }

        h2 { 
            margin: 10px 0 0; 
            color: var(--white); 
            font-size: 1.4rem; 
            letter-spacing: 3px;
            font-weight: 800;
            text-transform: uppercase;
        }
        
        p { color: var(--accent); font-size: 0.8rem; margin-top: 5px; font-weight: 500; opacity: 0.8; }

        .main-card {
            width: 85%;
            max-width: 380px;
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(100, 255, 218, 0.05);
            text-align: center;
        }

        input[type="tel"] {
            width: 100%;
            background: #020c1b;
            border: 2px solid #233554;
            border-radius: 16px;
            padding: 18px;
            color: var(--accent);
            font-size: 1.6rem;
            text-align: center;
            font-weight: bold;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        input[type="tel"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(100, 255, 218, 0.1);
        }

        .actions { display: grid; gap: 12px; }

        .btn {
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:active { transform: scale(0.97); }

        .btn-wa { background: #25D366; color: white; }
        .btn-sms { background: #1d9bf0; color: white; }
        .btn-call { background: var(--text-main); color: var(--bg-dark); }

        .footer-tag {
            margin-top: 30px;
            font-size: 0.7rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="install-prompt">
        <span>Admin App එක Install කරන්නද?</span>
        <button onclick="installApp()">එක් කරන්න</button>
    </div>

    <header>
        <div class="profile-section">
            <img id="logo-preview" src="https://raw.githubusercontent.com/janithdidula025-design/adm-vcard/main/logo.jpg" alt="Logo">
            <label for="file-upload" class="upload-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#020c1b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            </label>
            <input type="file" id="file-upload" accept="image/*" style="display:none" onchange="previewLogo(this)">
        </div>
        <h2>ADM CENTRAL</h2>
        <p>MANAGEMENT & DISPATCH</p>
    </header>

    <div class="main-card">
        <input type="tel" id="phone" placeholder="07XXXXXXXX" maxlength="10">

        <div class="actions">
            <button class="btn btn-wa" onclick="execute('wa')">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                WhatsApp Card
            </button>
            <button class="btn btn-sms" onclick="execute('sms')">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                Direct SMS
            </button>
            <button class="btn btn-call" onclick="execute('call')">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                Call Student
            </button>
        </div>
    </div>

    <div class="footer-tag">SYSTEM v2.0 • SECURE ACCESS</div>

    <script>
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-prompt').style.display = 'flex';
        });

        async function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                deferredPrompt = null;
                document.getElementById('install-prompt').style.display = 'none';
            }
        }

        function previewLogo(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('logo-preview').src = e.target.result;
                    localStorage.setItem('adm_custom_logo', e.target.result);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function execute(type) {
            const num = document.getElementById('phone').value;
            if (num.length < 10) return alert("කරුණාකර නිවැරදි අංකය ඇතුළත් කරන්න.");

            const baseUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/'));
            const logoLink = "https://raw.githubusercontent.com/janithdidula025-design/adm-vcard/main/logo.jpg";
            const cardUrl = `${baseUrl}/index.html?logo=${encodeURIComponent(logoLink)}`;
            
            const message = encodeURIComponent(`ආයුබෝවන්! ADM පන්ති විස්තර ඇතුළත් ඔබේ ඩිජිටල් කාඩ්පත මෙතැනින් ලබාගන්න: ${cardUrl}`);

            if(type === 'wa') window.open(`https://wa.me/94${num.substring(1)}?text=${message}`);
            if(type === 'sms') window.open(`sms:${num}?body=${message}`);
            if(type === 'call') window.open(`tel:${num}`);
        }

        window.onload = () => {
            const savedLogo = localStorage.getItem('adm_custom_logo');
            if (savedLogo) document.getElementById('logo-preview').src = savedLogo;
            
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(console.error);
            }
        };
    </script>
</body>
</html>
