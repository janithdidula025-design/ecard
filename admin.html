<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADM Private Class Card</title>
    <link rel="manifest" href="manifest-card.json">
    <meta name="theme-color" content="#0d237d">
    <style>
        :root { --primary: #50e3c2; --gold: #ffd700; --dark-blue: #0a192f; }
        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: radial-gradient(circle at top, #112240, #0a192f);
            color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center;
        }
        
        /* Install Banner */
        #installBanner { display: none; width: 100%; background: var(--primary); color: #000; padding: 12px; position: fixed; top: 0; z-index: 1000; font-weight: bold; justify-content: space-between; align-items: center; box-sizing: border-box; font-size: 0.85rem; }
        #installBtn { background: #000; color: #fff; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; }

        .card { 
            width: 88%; max-width: 360px; background: rgba(255, 255, 255, 0.05); 
            padding: 35px 20px; border-radius: 30px; border: 1px solid rgba(80, 227, 194, 0.2); 
            backdrop-filter: blur(15px); text-align: center; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        
        .profile-area { position: relative; display: inline-block; margin-bottom: 20px; }
        .p-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--gold); padding: 5px; background: #0a192f; }
        .badge { position: absolute; bottom: 5px; right: 5px; background: var(--gold); color: #000; font-size: 10px; font-weight: bold; padding: 4px 8px; border-radius: 10px; border: 2px solid #0a192f; }

        .institute-name { color: var(--primary); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; margin-bottom: 5px; }
        h2 { margin: 5px 0; font-size: 1.6rem; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .designation { color: var(--gold); font-size: 0.9rem; opacity: 0.9; margin-bottom: 20px; font-weight: 500; }
        
        .info-section { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; margin-bottom: 25px; border-left: 4px solid var(--primary); text-align: left; font-size: 0.9rem; line-height: 1.6; }
        
        .btn { width: 100%; padding: 15px; border-radius: 15px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1rem; margin-bottom: 12px; border: none; transition: 0.3s; cursor: pointer; }
        .btn-wa { background: #25D366; color: #fff; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }
        .btn-save { background: #fff; color: #0a192f; box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1); }
        .btn:active { transform: scale(0.97); }

        .wa-icon { width: 22px; height: 22px; fill: white; }
    </style>
</head>
<body>
    <div id="installBanner">
        <span>📲 ADM Digital Card එක App එකක් විදිහට දාගන්න</span>
        <button id="installBtn">INSTALL</button>
    </div>

    <div class="card">
        <div class="institute-name">ADM Higher Education</div>
        <div class="profile-area">
            <img id="cardLogo" src="https://raw.githubusercontent.com/janithdidula025-design/adm-vcard/main/logo.jpg" class="p-img">
            <div class="badge">PRIVATE TUTOR</div>
        </div>
        <h2>JANITH DIDULA</h2>
        <div class="designation">Organizer & Manager</div>
        
        <div class="info-section">
            📍 මීගමුව පාර, නාරම්මල<br>
            🎓 Individual & Group Classes<br>
            📞 071 065 8051
        </div>

        <a href="https://wa.me/94710658051" class="btn btn-wa">
            <svg class="wa-icon" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.06 3.973L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/></svg>
            WHATSAPP සම්බන්ධ වන්න
        </a>
        <button onclick="saveContact()" class="btn btn-save">👤 CONTACT එක SAVE කරන්න</button>
    </div>

    <script>
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('installBanner').style.display = 'flex';
        });
        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                document.getElementById('installBanner').style.display = 'none';
            }
        });
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        function saveContact() {
            const v = `BEGIN:VCARD\nVERSION:3.0\nFN:Janith Didula (ADM)\nTEL:0710658051\nEND:VCARD`;
            const b = new Blob([v], {type:'text/vcard'});
            const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download='Janith_ADM.vcf'; a.click();
        }
    </script>
</body>
</html>
